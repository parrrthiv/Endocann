/* CLINICAL, INTUITIVE, MOBILE-FIRST */
:root{
  --bg:#eef7fb;
  --card:#ffffff;
  --card2:#f6fbfd;
  --ink:#08283c;
  --txt:#3e5d6e;
  --muted:#748b9d;
  --line:#d6e7ee;
  --brand:#084c66;
  --brand2:#00a7a2;
  --brand3:#e6f8f8;
  --good:#0f8a5f;
  --good2:#e7f8f0;
  --warn:#b56d06;
  --warn2:#fff4dd;
  --bad:#bf3447;
  --bad2:#fff0f3;
  --violet:#5d63c6;
  --violet2:#f1f2ff;
  --shadow:0 14px 38px rgba(6,40,62,.13);
  --soft-shadow:0 6px 18px rgba(6,40,62,.07);
}
html[data-theme=dark]{
  --bg:#061722;
  --card:#102638;
  --card2:#173246;
  --ink:#f2fbff;
  --txt:#c2d9e7;
  --muted:#8ba5b6;
  --line:rgba(218,239,251,.14);
  --brand:#58c2de;
  --brand2:#65ddd5;
  --brand3:#133844;
}
html[data-theme=kar]{
  --bg:#fff8f0;
  --card:#ffffff;
  --card2:#fffaf5;
  --ink:#351b07;
  --txt:#654b2d;
  --muted:#927557;
  --line:#ead8c4;
  --brand:#a95406;
  --brand2:#138a55;
  --brand3:#fff0dc;
}
html,body{overscroll-behavior-y:none;}
body{
  background:
    radial-gradient(circle at 12% -8%,rgba(0,167,162,.13),transparent 32%),
    radial-gradient(circle at 110% 8%,rgba(8,76,102,.12),transparent 28%),
    var(--bg);
}
.app{max-width:640px;background:transparent;}
.top{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(214,231,238,.82);
  box-shadow:0 8px 22px rgba(6,40,62,.06);
}
html[data-theme=dark] .top{background:rgba(16,38,56,.90);}
.logo,.loginlogo{
  background:linear-gradient(145deg,#062f46,var(--brand) 52%,var(--brand2));
  box-shadow:0 12px 28px rgba(8,76,102,.25);
}
.brand b{letter-spacing:-.25px;}
.brand small{font-size:10px;letter-spacing:.02em;}
.controls select,.login-controls select{
  background:var(--card);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
}
.tabs{
  position:sticky;
  top:calc(57px + var(--safe-top));
  z-index:55;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(214,231,238,.85);
}
html[data-theme=dark] .tabs{background:rgba(16,38,56,.88);}
.tab{
  min-height:40px;
  padding:9px 13px;
  box-shadow:0 1px 0 rgba(255,255,255,.55) inset;
}
.tab.active{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  box-shadow:0 8px 18px rgba(8,76,102,.22);
}
.login{
  background:
    radial-gradient(circle at 50% 0,rgba(0,167,162,.18),transparent 34%),
    linear-gradient(180deg,#f5fbfe,var(--bg));
}
html[data-theme=dark] .login{background:radial-gradient(circle at 50% 0,rgba(101,221,213,.13),transparent 35%),var(--bg);}
.product-pill{
  background:rgba(255,255,255,.78);
  color:var(--brand);
  box-shadow:var(--soft-shadow);
}
.logincard,.panel,.card,.kpi{
  box-shadow:var(--soft-shadow);
}
.role{
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
}
.role:active,.card[data-go]:active,.btn:active,.tab:active,.nav:active{transform:scale(.985);}
.role:hover,.card[data-go]:hover{
  border-color:rgba(0,167,162,.45);
  box-shadow:0 10px 24px rgba(6,40,62,.10);
}
.hero{
  background:
    radial-gradient(circle at 88% -10%,rgba(255,255,255,.30),transparent 34%),
    radial-gradient(circle at 12% 110%,rgba(101,221,213,.24),transparent 32%),
    linear-gradient(145deg,#06283f 0%,#084c66 55%,#00a7a2 100%);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 44px rgba(6,40,62,.20);
}
.hero p{font-size:13.4px;line-height:1.55;}
.badge{
  background:rgba(255,255,255,.16);
  color:#e9ffff;
}
.hbox{
  min-height:66px;
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.20);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.btn{
  min-height:48px;
  border-radius:17px;
  box-shadow:0 10px 20px rgba(8,76,102,.17);
}
.btn.white{
  color:#064c66;
  box-shadow:0 10px 20px rgba(255,255,255,.10);
}
.btn.ghost{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border-color:var(--line);
}
.btn.good{background:linear-gradient(135deg,#0b7652,#18b77b);}
.btn.bad{background:linear-gradient(135deg,#a82135,#db4356);}
.btn.warn{background:linear-gradient(135deg,#a35c05,#e19622);}
.label{
  color:var(--brand2);
  margin-top:15px;
}
.title{letter-spacing:-.35px;}
.sub{line-height:1.45;}
.notice{
  border-radius:18px;
  line-height:1.55;
  box-shadow:0 1px 0 rgba(255,255,255,.48) inset;
}
.card{
  border-radius:20px;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.card h3{font-size:14.5px;}
.card p{line-height:1.45;}
.ico{
  background:linear-gradient(135deg,var(--brand3),rgba(255,255,255,.82));
  color:var(--brand);
}
.panel{border-radius:24px;}
.ph{
  background:linear-gradient(180deg,var(--card),var(--card2));
}
.kpi b{font-size:25px;}
.form input,.form textarea,.form select{
  background:var(--card2);
  min-height:46px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.72);
}
.form input:focus,.form textarea:focus,.form select:focus{
  outline:none;
  border-color:var(--brand2);
  box-shadow:0 0 0 4px rgba(0,167,162,.12);
  background:var(--card);
}
.queue,.flow,.apirow{min-height:54px;}
.tok,.num{background:linear-gradient(135deg,var(--brand),var(--brand2));}
.dot{background:var(--brand2);box-shadow:0 0 0 4px var(--brand3);}
.bottom{
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 -10px 26px rgba(6,40,62,.10);
}
.nav{
  min-height:58px;
  padding-top:9px;
  transition:background .16s ease,color .16s ease;
}
.nav.active{
  color:var(--brand);
  background:linear-gradient(180deg,rgba(0,167,162,.08),transparent);
}
.nav.active i{color:var(--brand2);}
.modal{background:rgba(3,21,34,.62);}
.sheet{
  border-top:1px solid rgba(255,255,255,.35);
  box-shadow:0 -18px 44px rgba(3,21,34,.28);
}
.close{font-size:22px!important;}
.toast{
  box-shadow:0 10px 28px rgba(3,21,34,.24);
}
[data-action],[data-go],[data-login],button{
  -webkit-user-select:none;
  user-select:none;
}
@media(max-width:420px){
  .top{padding-left:9px;padding-right:9px;}
  .controls{flex-basis:144px;}
  .tabs{top:calc(55px + var(--safe-top));}
  .hero{margin:10px;border-radius:26px;padding:20px 14px;}
  h1{font-size:28px;}
  .btns{gap:7px;}
  .btn{font-size:14px!important;min-height:46px;}
  .section{padding-left:10px;padding-right:10px;}
  .logincard{border-radius:24px;padding:15px;}
  .login h1{font-size:30px;}
  .role small{font-size:10.5px;}
}
@media(max-width:360px){
  .controls{flex-basis:128px;}
  .controls select{height:34px;font-size:14px!important;}
  .hero{padding:18px 12px;}
  .herogrid{gap:4px;}
  .hbox{min-height:60px;}
  .hbox span{font-size:6px;}
  .kpis{gap:6px;}
  .kpi b{font-size:21px;}
  .btn{font-size:13px!important;}
}
@media (hover:none){
  .role:hover,.card[data-go]:hover{box-shadow:var(--soft-shadow);}
}
@media print{
  .top,.tabs,.bottom,.login,.btns,.footerbrand{display:none!important;}

<script id="scroll-fix-js-final">
(function(){
  function unlockPage(){
    if(!document.getElementById('modal') || !document.getElementById('modal').classList.contains('active')){
      document.body.classList.remove('lock');
      document.body.style.overflowY='auto';
      document.documentElement.style.overflowY='auto';
      document.body.style.position='static';
    }
  }
  function ensureScrollable(){
    unlockPage();
    var app=document.getElementById('app');
    var main=document.getElementById('main');
    if(app){app.style.overflow='visible'; app.style.height='auto';}
    if(main){main.style.overflow='visible'; main.style.height='auto';}
  }
  window.addEventListener('load', ensureScrollable, {passive:true});
  window.addEventListener('resize', ensureScrollable, {passive:true});
  window.addEventListener('orientationchange', function(){setTimeout(ensureScrollable,250);}, {passive:true});
  document.addEventListener('click', function(){setTimeout(ensureScrollable,80);}, true);
  document.addEventListener('touchmove', function(e){
    var modal=document.getElementById('modal');
    if(modal && modal.classList.contains('active')){
      if(e.target && e.target.closest && e.target.closest('.sheet')) return;
    }
  }, {passive:true});
})();
</script>
