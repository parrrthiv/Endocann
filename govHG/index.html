function citizenPage(){return '<div class="section"><div class="title">'+H(T('citizen_title'))+'</div><div class="sub">'+H(T('citizen_sub'))+'</div><div class="grid2">'+card('🚑',T('emergency'),T('ambulance_sent'),null,'ambulance')+card('🏠',T('sample'),T('sample_sent'),null,'sample')+'</div><div class="panel"><div class="ph"><h3>📝 '+H(T('register'))+'</h3><span class="tag gt">'+H(T('consent')).slice(0,18)+'…</span></div><div class="pb"><div class="form"><div class="row2"><div><label>'+H(T('name'))+'</label><input value="Ramesh Kumar"></div><div><label>'+H(T('age'))+'</label><input value="58"></div></div><div><label>'+H(T('mobile'))+'</label><input value="+91 98765 43210"></div><div><label>'+H(T('complaint'))+'</label><textarea>Chest pain, sweating, diabetes history</textarea></div><div class="notice good">✅ '+H(T('consent'))+'</div><div class="btns">'+btn('🎫 '+T('generate_token'),'token','')+btn('💬 '+T('wa_opd'),'wa','good')+btn('🤖 '+T('ai_triage'),'triage','ghost')+btn('📤 QR','qr','ghost')+'</div></div></div></div><div id="tokenBox"></div><div class="panel"><div class="ph"><h3>💊 '+H(T('erx_view'))+'</h3><span class="tag '+(state.rx?'gt':'at')+'">'+(state.rx?'eRx':'Demo')+'</span></div><div class="pb">'+erxHtml()+'</div></div></div>'}
function phcPage(){return '<div class="section"><div class="title">'+H(T('phc_title'))+'</div><div class="sub">'+H(T('phc_sub'))+'</div>'+kpis([['46',T('tokens_today')],['3',T('urgent_cases')],['35',T('completed')]])+'<div class="notice good">'+H(T('staff_proof'))+'</div><div class="panel"><div class="ph"><h3>📋 '+H(T('live_queue'))+'</h3><span class="tag at">8</span></div><div class="pb">'+q('042','Ramesh Kumar','Chest pain · 58M',T('urgent_cases'),'rt')+q('043','Sunita Patel','Diabetes follow-up',T('board'),'pt')+q('044','Arjun','Fever · 8M','Waiting','at')+'</div></div><div class="panel"><div class="ph"><h3>📊 '+H(T('vitals'))+'</h3><span class="tag gt">ABDM</span></div><div class="pb"><div class="form"><div class="row2"><div><label>'+H(T('bp'))+'</label><input value="158/96"></div><div><label>'+H(T('pulse'))+'</label><input value="104"></div></div><div class="row2"><div><label>'+H(T('spo2'))+'</label><input value="96%"></div><div><label>'+H(T('sugar'))+'</label><input value="218 mg/dL"></div></div><div class="btns">'+btn('💾 '+T('save_vitals'),'vitals','')+btn('📎 '+T('upload_reports'),'reports','ghost')+'</div></div></div></div></div>'}
function doctorPage(){return '<div class="section"><div class="title">'+H(T('doctor_title'))+'</div><div class="sub">'+H(T('doctor_sub'))+'</div><div class="notice good">'+H(T('hero_guard'))+'</div>'+kpis([['3',T('urgent_cases')],['18','eRx'],['35','Cases']])+'<div class="panel"><div class="ph"><h3>🤖 '+H(T('case_card'))+'</h3><span class="tag rt">RED</span></div><div class="pb"><div class="notice bad">'+H(T('red_pathway'))+'</div>'+progress(T('ai_triage'),92)+progress(T('upload_reports'),78)+'<div class="btns">'+btn('💊 '+T('write_erx'),'rx','good')+'<button class="btn" data-go="board">📹 '+H(T('start_video'))+'</button>'+btn('🏥 '+T('refer_hospital'),'refer','bad')+btn('🛡️ '+T('request_board'),'boardcall','ghost')+'</div></div></div></div>'}
function boardPage(){var opts=['cardiology','obg','pediatrics','oncology','psychiatry','dermatology','ortho','medicine','ayurveda','nutrition'];return '<div class="section"><div class="title">'+H(T('board_title'))+'</div><div class="sub">'+H(T('board_sub'))+'</div><div class="video-hero"><div class="badge"><span class="live-dot"></span>'+H(T('live_now'))+'</div><h3 style="font-size:20px;color:#fff">📹 '+H(T('join_video'))+'</h3><p style="font-weight:850;color:rgba(255,255,255,.86);font-size:12px;margin-top:5px">'+H(T('esanjeevani_bridge'))+' · '+H(T('specialty_dropdown'))+'</p><div class="video-grid"><div class="tile"><div class="avatar">🩺</div><b>'+H(T('doctor_tile'))+'</b><small>Dr. Priya · PHC</small></div><div class="tile"><div class="avatar">👤</div><b>'+H(T('patient_tile'))+'</b><small>Token 042</small></div><div class="tile"><div class="avatar">❤️</div><b>'+H(T('specialist_tile'))+'</b><small id="specName">'+H(T(state.specialty))+'</small></div><div class="tile"><div class="avatar">🤖</div><b>'+H(T('board_tile'))+'</b><small>AI summary</small></div></div></div><div class="panel"><div class="ph"><h3>🛡️ '+H(T('specialty_dropdown'))+'</h3><span class="tag gt">'+H(T('live_now'))+'</span></div><div class="pb"><div class="form"><select id="specialtySelect">'+opts.map(function(o){return '<option value="'+o+'" '+(o===state.specialty?'selected':'')+'>'+H(T(o))+'</option>'}).join('')+'</select></div><div class="btns">'+btn('📹 '+T('join_video'),'video','good')+btn('📎 '+T('share_reports'),'shareReports','')+btn('📡 '+T('esanjeevani_bridge'),'esBridge','ghost')+btn('✅ '+T('send_advisory'),'advisory','ghost')+'</div></div></div></div>'}
function reportsPage(){return '<div class="section"><div class="title">'+H(T('reports_title'))+'</div><div class="sub">'+H(T('reports_sub'))+'</div>'+kpis([['1,248',T('opd_today')],['18%',T('referrals_avoided')],['312',T('followups_due')]])+'<div class="grid2">'+card('🗺️',T('district_heatmap'),'Bengaluru North · 3 PHCs live',null,'heat')+card('🏅',T('worker_log'),T('performance_s'),'staff')+card('📈',T('disease_trends'),'Fever · Diabetes · BP',null,'trends')+card('💊',T('medicine_demand'),'72% fulfilled · 28% pending',null,'medicine')+card('🚨',T('public_alerts'),'Dengue / ILI cluster alerts',null,'alerts')+card('📄',T('minister_report'),'One-tap review note',null,'report')+'</div></div>'}
function staffPage(){return '<div class="section"><div class="title">'+H(T('staff_title'))+'</div><div class="sub">'+H(T('staff_sub'))+'</div>'+kpis([['92%',T('cases_handled')],['88%',T('response_time')],['4.6/5',T('patient_feedback')]])+'<div class="panel"><div class="ph"><h3>🏅 '+H(T('recognition'))+'</h3><span class="tag gt">Top</span></div><div class="pb">'+q('KR','Nurse Kavitha Rao','Vitals completed · red alerts cleared','Top','gt')+q('PS','Dr. Priya Sharma','18 eRx · board review completed','Top','gt')+q('PHC','Yelahanka PHC',T('top_staff'),'Winner','gt')+'</div></div><div class="grid2">'+card('📜',T('audit_trail'),T('audit'),null,'audit')+card('🧾',T('performance'),T('performance_s'),null,'proof')+'</div></div>'}
function compliancePage(){return '<div class="section"><div class="title">'+H(T('compliance_title'))+'</div><div class="sub">'+H(T('compliance_sub'))+'</div><div class="notice good">'+H(T('not_replace'))+' — '+H(T('not_replace_s'))+'</div><div class="grid2">'+card('🔐',T('dpdp'),T('privacy'))+card('🪪',T('abdm'),'Consent-based exchange')+card('🗄️',T('data_residency'),'NIC / State Data Centre')+card('🧑‍⚕️',T('doctor_final'),T('hero_guard'))+card('📜',T('audit'),'Every click logged')+card('💬','WhatsApp / Arattai','Only after consent')+'</div></div>'}
function backendPage(){return '<div class="section"><div class="title">'+H(T('backend_title'))+'</div><div class="sub">'+H(T('backend_sub'))+'</div><div class="panel"><div class="ph"><h3>🔌 API</h3><span class="tag gt">Mock Live</span></div><div class="pb">'+apiRows()+'</div></div></div>'}
function pilotPage(){return '<div class="section"><div class="title">'+H(T('pilot_title'))+'</div><div class="sub">'+H(T('pilot_sub'))+'</div><div class="panel"><div class="pb">'+q('1',T('phase1'),T('phase1s'),'Start','gt')+q('2',T('phase2'),T('phase2s'),'Scale','pt')+q('3',T('phase3'),T('phase3s'),'Launch','gt')+'</div></div><div class="btns">'+btn('📄 '+T('minister_report'),'report','')+btn('📤 '+T('share_pilot'),'share','good')+'</div></div>'}
function pageHtml(){var m={home:homePage,citizen:citizenPage,phc:phcPage,doctor:doctorPage,board:boardPage,reports:reportsPage,staff:staffPage,compliance:compliancePage,backend:backendPage,pilot:pilotPage};return (m[state.page]||homePage)()}
function renderLogin(){el('loginKicker').textContent=T('login_kicker');el('loginTitle').textContent=T('login_title');el('loginSub').textContent=T('login_sub');el('loginLabel').textContent=T('flow_menu');el('enterDemo').innerHTML='🚀 '+H(T('enter_demo'));var roles=[['citizen','👤',T('citizen_login'),T('login_citizen_sub')],['phc','🏥',T('staff_login'),T('login_staff_sub')],['doctor','🩺',T('doctor_login'),T('login_doctor_sub')],['reports','📊',T('minister_login'),T('login_minister_sub')]];el('loginRoles').innerHTML=roles.map(function(r){return '<button class="role" data-enter="'+r[0]+'"><b>'+r[1]+' '+H(r[2])+'</b><small>'+H(r[3])+'</small></button>'}).join('')}
function renderBottom(){el('bottomInner').innerHTML=bottom.map(function(p){return '<button class="nav '+(state.page===p?'active':'')+'" data-go="'+p+'"><i>'+icon[p]+'</i><span>'+H(T('bottom_'+p)||T(p))+'</span></button>'}).join('');el('fabText').textContent=T('flow_menu')}
function renderAll(){syncSelects();renderLogin();el('brandSub').textContent=T('app_sub');el('main').innerHTML=pageHtml();renderBottom();var main=el('main'); if(main) main.scrollTop=0;}
function go(p){state.page=pages.indexOf(p)>=0?p:'home';history.replaceState(null,'','#'+state.page);renderAll()}
function enter(p){state.entered=true;el('login').style.display='none';el('app').style.display='flex';el('bottom').style.display='block';el('fab').style.display='flex';go(p||'home')}
function toast(msg){var t=el('toast');t.textContent=msg;t.className='toast active';clearTimeout(toast.t);toast.t=setTimeout(function(){t.className='toast'},1800)}
function openModal(title,body){el('modalTitle').innerHTML=title;el('modalBody').innerHTML=body;el('modal').className='modal active'}
function closeModal(){el('modal').className='modal'}
function action(a){if(a==='token'){openModal(T('token'),'<div class="notice good">'+H(T('token_sent'))+'</div><div style="text-align:center;font-size:58px;font-weight:950;color:var(--brand2)">043</div><div class="tag rt">'+H(T('urgent_cases'))+' · Counter 2</div>');return}if(a==='wa'){openModal(T('wa_opd'),'<div class="notice good">'+H(T('consent'))+'</div>'+q('Bot',T('wa_opd'),'1 OPD · 2 Follow-up · 3 Emergency')+q('AI',T('triage_red'),'Token 043','RED','rt'));return}if(a==='triage'){openModal(T('ai_triage'),'<div class="notice bad">'+H(T('triage_red'))+'</div>'+progress(T('ai_triage'),92));return}if(a==='ambulance'){openModal(T('emergency'),'<div class="notice bad">'+H(T('ambulance_sent'))+'</div>'+q('ETA','8 min','KA-05-GH-108','LIVE','rt'));return}if(a==='sample'){openModal(T('sample'),'<div class="notice good">'+H(T('sample_sent'))+'</div>'+q('ANM','Meena S','4:30 PM slot','Assigned','gt'));return}if(a==='qr'){openModal('QR','<div class="notice good">'+H(T('qr_share'))+'</div><div style="font-size:72px;text-align:center">▦</div>');return}if(a==='vitals'){openModal(T('vitals'),'<div class="notice good">'+H(T('save_vitals'))+'</div>'+q(T('bp'),'158/96','High flag','Alert','at'));return}if(a==='rx'){state.rx=true;openModal(T('write_erx'),erxHtml());renderAll();return}if(a==='video'){openModal(T('board_title'),'<div class="video-hero"><div class="badge"><span class="live-dot"></span>'+H(T('live_now'))+'</div><div class="video-grid"><div class="tile"><div class="avatar">🩺</div><b>'+H(T('doctor_tile'))+'</b><small>PHC</small></div><div class="tile"><div class="avatar">❤️</div><b>'+H(T('specialist_tile'))+'</b><small>'+H(T(state.specialty))+'</small></div></div></div><div class="notice good">'+H(T('video_started'))+'</div>');return}if(a==='shareReports'){toast(T('reports_shared'));return}if(a==='esBridge'){toast(T('es_bridge'));return}if(a==='advisory'||a==='boardcall'){toast(T('advisory_sent'));return}if(a==='report'){openModal(T('minister_report'),kpis([['3','PHCs'],['94%','Closure'],['18%','Avoided']])+progress(T('worker_log'),94));return}if(a==='share'){toast(T('pilot_shared'));return}if(a==='sendwa'){toast(T('send_wa'));return}if(a==='pharmacy'){toast(T('pharmacy'));return}if(a==='print'){window.print();return}toast(T('action_done'))}
function menu(){var all=['home','citizen','phc','doctor','board','reports','staff','compliance','backend','pilot'];openModal(T('menu_title'),'<div class="grid2">'+all.map(function(p){return card(icon[p],T(p),T('official_names'),p)}).join('')+'</div>')}
document.addEventListener('click',function(e){var n=e.target.closest&&e.target.closest('[data-enter],[data-go],[data-action],[data-close],[data-menu]');if(!n)return;if(n.dataset.close){closeModal();return}if(n.dataset.menu){menu();return}if(n.dataset.enter){enter(n.dataset.enter);return}if(n.dataset.go){closeModal();go(n.dataset.go);return}if(n.dataset.action){action(n.dataset.action);return}},false);
document.addEventListener('change',function(e){if(e.target.id==='lang'||e.target.id==='loginLang')setLang(e.target.value);if(e.target.id==='theme'||e.target.id==='loginTheme')setTheme(e.target.value);if(e.target.id==='specialtySelect'){state.specialty=e.target.value;toast(T(e.target.value));renderAll();}},false);
el('modal').addEventListener('click',function(e){if(e.target===el('modal'))closeModal()});
window.addEventListener('hashchange',function(){var p=location.hash.replace('#','');if(p&&pages.indexOf(p)>=0)go(p)});
window.addEventListener('resize',setViewport,{passive:true});window.addEventListener('orientationchange',function(){setTimeout(setViewport,250)},{passive:true});setViewport();setTheme(state.theme);setLang(state.lang);if(location.hash)state.page=location.hash.replace('#','');renderAll();
})();
</script>
</body>
</html>
