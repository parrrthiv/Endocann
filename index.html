<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Instant redirect (works even without JavaScript) -->
  <meta http-equiv="refresh" content="0; url=https://vedikfy.com/">
  <!-- Tell search engines the canonical destination -->
  <link rel="canonical" href="https://vedikfy.com/">
  <title>Redirecting…</title>
  <script>
    // location.replace() does not add this page to history,
    // so the visitor's Back button won't bounce them back here.
    window.location.replace("https://vedikfy.com/");
  </script>
</head>
<body style="font-family:system-ui,sans-serif;text-align:center;margin-top:20vh;color:#333">
  <p>Redirecting you to <a href="https://vedikfy.com/">vedikfy.com</a>…</p>
</body>
</html>
