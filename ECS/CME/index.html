ch every claim to its evidence level.\n\nDetail from source deck after scientific cleanup:\nCritical: ECS education must use consistent evidence language — this is non-negotiable\nGrade 1 — Approved Clinical Use (Teach as established):\nCannabidiol (Epidiolex): FDA 2018, EMA 2019 — Dravet syndrome and Lennox-Gastaut syndrome (treatment-resistant epilepsy). Based on RCT data.\nNabilone, Dronabinol: Approved for chemotherapy-induced nausea and vomiting (CINV) and HIV-associated anorexia\nSativex (THC:CBD oromucosal spray): Approved in UK, Canada, EU for MS-associated spasticity\nGrade 2 — Promising Clinical Evidence (Teach as 'emerging', not established):\nCBD in anxiety: Open-label and small RCT data — promising but insufficient for standard of care\nMedical cannabis in chronic pain: Multiple trials, systematic reviews positive but heterogeneous — guideline recognition in some jurisdictions without universal recommendation\nGrade 3 — Preclinical Only (Teach mechanism only — no clinical claims):\nAnti-cancer, neurodegenerative prevention, metabolic disease, IBS — mechanistic data in cell/animal models only\nMANDATORY RULE: Grade 3 content must NEVER be taught as clinical evidence. 'In preclinical models' must precede every Grade 3 claim\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 64, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Epilepsy — Strongest Clinical Evidence for ECS Modulation", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "GRADE 1 - approved use", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["⚡ Epidiolex — FDA Approved 2018", "Pharmaceutical-grade CBD (Epidiolex, GW Pharmaceuticals) approved by FDA for Dravet syndrome and Lennox-Gastaut syndrome (LGS) in patients ≥2 years. Based on three pivotal RCTs demonstrating significant seizure frequency reduction vs placebo.", "🧬 ECS Mechanism in Epilepsy", "Sustained glutamate → postsynaptic 2-AG synthesis → retrograde CB1 → ↓glutamate release (protective). In epilepsy, this mechanism may be insufficient. CBD: TRPV1 desensitisation, VDCC inhibition, GPR55 antagonism, 5-HT1A agonism — multiple anti-convulsant mechanisms beyond CB1.", "📊 Clinical Evidence Summary"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Epilepsy — Strongest Clinical Evidence for ECS Modulation\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\n⚡ Epidiolex — FDA Approved 2018\nPharmaceutical-grade CBD (Epidiolex, GW Pharmaceuticals) approved by FDA for Dravet syndrome and Lennox-Gastaut syndrome (LGS) in patients ≥2 years. Based on three pivotal RCTs demonstrating significant seizure frequency reduction vs placebo.\n🧬 ECS Mechanism in Epilepsy\nSustained glutamate → postsynaptic 2-AG synthesis → retrograde CB1 → ↓glutamate release (protective). In epilepsy, this mechanism may be insufficient. CBD: TRPV1 desensitisation, VDCC inhibition, GPR55 antagonism, 5-HT1A agonism — multiple anti-convulsant mechanisms beyond CB1.\n📊 Clinical Evidence Summary\nDravet syndrome (GWPCARE1/2): 41% median reduction in convulsive seizures vs 17% placebo. LGS (GWPCARE3/4): 44% reduction in drop seizures vs 22% placebo. Number needed to treat ~8-10. US: prescription cannabidiol was descheduled in 2020; safety monitoring remains essential.\n⚠️ Teaching Notes & Safety\nCBD inhibits CYP2C19 and CYP3A4 — significant interaction with clobazam (increases active N-desmethylclobazam → ↑sedation). Hepatotoxicity concern at higher doses. Routine LFT monitoring recommended. This is the only Grade 1 ECS indication with MBBS teaching relevance.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 65, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Chronic Pain — ECS Mechanisms and Clinical Evidence", "subtitle": "Mechanism does not equal indication: match every claim to its evidence level.", "evidence": "GRADE 1 - approved use", "teaching": "Mechanism does not equal indication: match every claim to its evidence level.", "bullets": ["Chronic pain is the most common reason patients ask about cannabinoids — teach the mechanism AND the evidence quality", "ECS mechanisms in chronic pain pathophysiology:", "Central sensitisation: repetitive nociceptive input → ↓GABA in dorsal horn → ↑AMPA receptor expression → wind-up and allodynia; ECS tone can attenuate this via presynaptic CB1", "Descending inhibitory failure: in fibromyalgia and chronic widespread pain, descending noradrenergic/serotonergic inhibition from brainstem is reduced; ECS in PAG may support descending inhibition", "Neuroinflammatory pain: microglial CB2 activation → ↓neuro-inflammatory mediators — relevant to neuropathic and cancer pain"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Chronic Pain — ECS Mechanisms and Clinical Evidence\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Mechanism does not equal indication: match every claim to its evidence level.\n\nDetail from source deck after scientific cleanup:\nChronic pain is the most common reason patients ask about cannabinoids — teach the mechanism AND the evidence quality\nECS mechanisms in chronic pain pathophysiology:\nCentral sensitisation: repetitive nociceptive input → ↓GABA in dorsal horn → ↑AMPA receptor expression → wind-up and allodynia; ECS tone can attenuate this via presynaptic CB1\nDescending inhibitory failure: in fibromyalgia and chronic widespread pain, descending noradrenergic/serotonergic inhibition from brainstem is reduced; ECS in PAG may support descending inhibition\nNeuroinflammatory pain: microglial CB2 activation → ↓neuro-inflammatory mediators — relevant to neuropathic and cancer pain\nClinical evidence grade for pain:\nNeuropathic pain: Best evidence — multiple RCTs of smoked cannabis, nabiximols, and CBD in HIV-neuropathy, post-herpetic neuralgia, diabetic neuropathy. Canadian guidelines conditionally recommend for neuropathic pain.\nCancer pain: Nabiximols (Sativex) add-on therapy — meta-analysis positive but smaller effects than opioids alone; adjunct not replacement\nMusculoskeletal/inflammatory pain: Limited RCT data; observational evidence positive but confounded\nEvidence boundary: Teach that cannabinoids for pain are 'adjunct with emerging evidence' — not first-line therapy replacing established analgesics\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 66, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Anxiety and Psychiatric Disorders — ECS Evidence", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 2 - emerging clinical", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["Anxiety is one of the most commonly self-reported reasons for cannabinoid use — teach the evidence accurately", "ECS mechanisms in anxiety:", "BLA (basolateral amygdala) AEA tone → fear inhibition; low AEA → enhanced fear/anxiety responses in both animal and human evidence", "Infralimbic cortex (ILC): AEA-dependent fear extinction — FAAH inhibitor experiments demonstrate reduced fear persistence; PTSD research basis", "5-HT1A agonism of CBD → anxiolysis via serotonin system — explains CBD's partially anxiolytic effects independent of CB1"], "boundary": "Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "notes": "Speaker notes - Anxiety and Psychiatric Disorders — ECS Evidence\n\nEvidence tag: GRADE 2 - emerging clinical\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nAnxiety is one of the most commonly self-reported reasons for cannabinoid use — teach the evidence accurately\nECS mechanisms in anxiety:\nBLA (basolateral amygdala) AEA tone → fear inhibition; low AEA → enhanced fear/anxiety responses in both animal and human evidence\nInfralimbic cortex (ILC): AEA-dependent fear extinction — FAAH inhibitor experiments demonstrate reduced fear persistence; PTSD research basis\n5-HT1A agonism of CBD → anxiolysis via serotonin system — explains CBD's partially anxiolytic effects independent of CB1\nClinical evidence for anxiety:\nGeneralised anxiety (SAD model): A landmark Crippa et al. fMRI study (2011): single CBD dose reduced anxiety and altered prefrontal-limbic blood flow in social anxiety disorder patients\nPTSD: Canadian guidelines and some VA guidance acknowledge adjunctive cannabinoid role in PTSD; sleep and nightmare components most supported\nParadox with THC: Low THC doses may reduce anxiety (CB1 in amygdala); HIGH THC doses are anxiogenic and can precipitate panic attacks — dose-dependent bidirectional effect\nSafety caveat: CBD for anxiety is Grade 2 evidence. THC can worsen anxiety at higher doses. Psychosis risk in vulnerable individuals is a separate safety concern requiring separate teaching.\n\nBoundary: Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "pmids": []}, {"num": 67, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Neurodegenerative Diseases — Preclinical Mechanisms", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 1 - approved use", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["Alzheimer's, Parkinson's, ALS — mechanistic ECS teaching with strict evidence grading", "Alzheimer's Disease — Preclinical evidence only:", "Amyloid cascade → neuroinflammation → microglial overactivation → neurotoxicity; CB2 upregulated in AD microglia → endogenous neuroprotective attempt", "THC preclinical: promotes Aβ clearance via CB1/CB2, reduces neuroinflammation in models (Bhaskaran/Bhattacharya labs, 2008-2016)", "Sativex AD pilot study (Broersen et al.): early signal but underpowered — no approved indication"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Neurodegenerative Diseases — Preclinical Mechanisms\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nAlzheimer's, Parkinson's, ALS — mechanistic ECS teaching with strict evidence grading\nAlzheimer's Disease — Preclinical evidence only:\nAmyloid cascade → neuroinflammation → microglial overactivation → neurotoxicity; CB2 upregulated in AD microglia → endogenous neuroprotective attempt\nTHC preclinical: promotes Aβ clearance via CB1/CB2, reduces neuroinflammation in models (Bhaskaran/Bhattacharya labs, 2008-2016)\nSativex AD pilot study (Broersen et al.): early signal but underpowered — no approved indication\nParkinson's Disease — Limited clinical data:\nCB1 in basal ganglia circuits → relevant to motor control; ECS modulation may reduce levodopa-induced dyskinesias in animal models\nNabilone for PD psychosis and dyskinesia: observational data and one small RCT — not standard of care\nALS — Preclinical only:\nALS models: ECS modulation slows motor neuron degeneration preclinically; no human RCTs with cannabinoids showing disease modification\nMANDATORY TEACHING STATEMENT: For all three conditions, cannabinoid therapy is NOT established or recommended. Mechanisms are taught as research frontiers only. Never teach 'cannabinoids treat neurodegeneration.'\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 68, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Oncology — Teaching Within Strict Boundaries", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "GRADE 1 - approved use", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["Cancer is the most high-stakes evidence-grading challenge in ECS education", "What CAN be taught — Grade 1 (APPROVED):", "Nabilone and dronabinol: APPROVED for chemotherapy-induced nausea and vomiting (CINV) — established evidence, guideline-recommended antiemetics in patients failing conventional therapy", "Cannabis for cancer pain: adjunct in opioid-refractory cancer pain — guideline-acknowledged in Canada, Australia, UK; evidence sufficient for palliative use consideration", "Appetite stimulation: dronabinol for cancer-related anorexia-cachexia — FDA approved for AIDS-related anorexia; cancer indication less established"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Oncology — Teaching Within Strict Boundaries\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nCancer is the most high-stakes evidence-grading challenge in ECS education\nWhat CAN be taught — Grade 1 (APPROVED):\nNabilone and dronabinol: APPROVED for chemotherapy-induced nausea and vomiting (CINV) — established evidence, guideline-recommended antiemetics in patients failing conventional therapy\nCannabis for cancer pain: adjunct in opioid-refractory cancer pain — guideline-acknowledged in Canada, Australia, UK; evidence sufficient for palliative use consideration\nAppetite stimulation: dronabinol for cancer-related anorexia-cachexia — FDA approved for AIDS-related anorexia; cancer indication less established\nWhat CAN be taught — Grade 3 (PRECLINICAL MECHANISM ONLY):\nAnti-proliferative pathways: In vitro — THC, CBD activate CB1/CB2 → ↑ceramide → ↑apoptosis; ↑ROS; ↓angiogenesis (VEGF) in cell lines\nAnti-invasion/anti-metastasis: Downregulation of matrix metalloproteinases (MMPs) and Id-1 expression in breast cancer cell lines (CBD, McAllister et al.)\nAnti-angiogenic: ↓VEGF via CB1/CB2 in glioma models — important tumour growth mechanism target\nHARD STOP RULE — MUST be taught explicitly:\nNO cannabinoid has completed Phase III RCTs demonstrating anti-tumour efficacy in humans. Zero approved cancer indications for anti-tumour purposes. Teaching ANY anti-cancer treatment claim at MBBS level is academically indefensible and potentially dangerous.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 69, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Approved Cannabinoid Medicines — Clinical Reference", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 1 - approved use", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["💊 Epidiolex (Cannabidiol)", "FDA 2018, EMA 2019. Pharmaceutical CBD for Dravet syndrome and Lennox-Gastaut syndrome. Oral solution 100mg/mL. RCT-proven anti-convulsant. CYP2C19/3A4 inhibitor — clobazam interaction important. LFT monitoring required at higher doses.", "💊 Sativex (THC:CBD 1:1 spray)", "Approved UK, Canada, EU, 30+ countries. MS-associated spasticity. Oromucosal spray — titration required. RCT evidence: 30% spasticity reduction vs placebo. NOT approved for pain as sole indication in most jurisdictions. Not available in India (2026).", "💊 Nabilone"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Approved Cannabinoid Medicines — Clinical Reference\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\n💊 Epidiolex (Cannabidiol)\nFDA 2018, EMA 2019. Pharmaceutical CBD for Dravet syndrome and Lennox-Gastaut syndrome. Oral solution 100mg/mL. RCT-proven anti-convulsant. CYP2C19/3A4 inhibitor — clobazam interaction important. LFT monitoring required at higher doses.\n💊 Sativex (THC:CBD 1:1 spray)\nApproved UK, Canada, EU, 30+ countries. MS-associated spasticity. Oromucosal spray — titration required. RCT evidence: 30% spasticity reduction vs placebo. NOT approved for pain as sole indication in most jurisdictions. Not available in India (2026).\n💊 Nabilone\nSynthetic CB1/CB2 agonist. Approved for CINV (chemotherapy-induced nausea/vomiting). More potent than dronabinol. Psychiatric adverse effects (dysphoria, dizziness) more common. Scheduled as controlled substance.\n💊 Dronabinol (Δ9-THC)\nSynthetic THC in sesame oil capsule. FDA-approved: CINV + AIDS anorexia. Variable bioavailability (PO). Available in some countries; not routinely available in India. CNS adverse effects: dizziness, dysphoria, euphoria dose-dependent.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 70, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "ECS in Disease — Evidence Level Summary", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": [], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - ECS in Disease — Evidence Level Summary\n\nEvidence tag: FOUNDATIONAL SCIENCE\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\n\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 71, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "ECS in Metabolic Disease", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 2 - emerging clinical", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["Metabolic syndrome, obesity, and ECS — mechanistic teaching", "ECS overactivation in obesity — the metabolic paradox:", "Obesity is associated with UPREGULATED peripheral ECS — particularly CB1 in adipose tissue, liver, and skeletal muscle", "Hepatic CB1 overactivation → ↑de novo lipogenesis → hepatic steatosis (NAFLD/NASH) — established mechanistic pathway", "Adipose CB1 → ↑lipogenic gene expression (SREBP-1c, ACC, FAS) → ↑triglyceride storage → ↑fat mass"], "boundary": "Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "notes": "Speaker notes - ECS in Metabolic Disease\n\nEvidence tag: GRADE 2 - emerging clinical\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nMetabolic syndrome, obesity, and ECS — mechanistic teaching\nECS overactivation in obesity — the metabolic paradox:\nObesity is associated with UPREGULATED peripheral ECS — particularly CB1 in adipose tissue, liver, and skeletal muscle\nHepatic CB1 overactivation → ↑de novo lipogenesis → hepatic steatosis (NAFLD/NASH) — established mechanistic pathway\nAdipose CB1 → ↑lipogenic gene expression (SREBP-1c, ACC, FAS) → ↑triglyceride storage → ↑fat mass\nHypothalamic CB1 dysregulation in obesity → altered leptin and ghrelin signalling → impaired satiety\nRimonabant — the cautionary pharmacological tale:\nRimonabant (CB1 inverse agonist): Approved Europe 2006 for obesity — significant weight loss and metabolic improvement in RCTs\nWithdrawn 2008: Serious psychiatric adverse effects — depression, anxiety, suicidal ideation — due to CNS CB1 blockade\nLesson: Peripheral-selective CB1 antagonists are in development to achieve metabolic benefit without CNS adverse effects\nCurrent research: Peripheral CB1 antagonism (non-BBB-crossing molecules) as metabolic target — illustrates importance of receptor distribution knowledge\n\nBoundary: Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "pmids": []}, {"num": 72, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "MODULE SUMMARY", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "GRADE 1 - approved use", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["Module 4 — ECS in Disease & Pathology", "Evidence grading is non-negotiable: Grade 1 (approved), Grade 2 (emerging RCTs), Grade 3 (preclinical only). Language must match evidence level.", "Epilepsy: Epidiolex — strongest ECS-based clinical evidence. CBD's mechanisms include TRPV1, GPR55, VDCC, 5-HT1A — multiple targets beyond CB1.", "Pain: Multi-level analgesia (peripheral, spinal, supraspinal). Neuropathic pain has Grade 2 evidence. Chronic pain adjunct — not opioid replacement.", "Psychiatry: BLA-AEA tone is anxiety-protective. CBD anxiolytic via 5-HT1A and FAAH inhibition. THC: bidirectional dose-dependent anxiety effect."], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - MODULE SUMMARY\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nModule 4 — ECS in Disease & Pathology\nEvidence grading is non-negotiable: Grade 1 (approved), Grade 2 (emerging RCTs), Grade 3 (preclinical only). Language must match evidence level.\nEpilepsy: Epidiolex — strongest ECS-based clinical evidence. CBD's mechanisms include TRPV1, GPR55, VDCC, 5-HT1A — multiple targets beyond CB1.\nPain: Multi-level analgesia (peripheral, spinal, supraspinal). Neuropathic pain has Grade 2 evidence. Chronic pain adjunct — not opioid replacement.\nPsychiatry: BLA-AEA tone is anxiety-protective. CBD anxiolytic via 5-HT1A and FAAH inhibition. THC: bidirectional dose-dependent anxiety effect.\nOncology boundary: CINV approved (nabilone/dronabinol). Anti-tumour claims are Grade 3 preclinical — NEVER teach as treatment. Hard stop.\nMetabolic disease: ECS overactivation in obesity (hepatic CB1). Rimonabant withdrawn for CNS effects — lesson in receptor distribution importance.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 73, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "CME Self-Assessment", "subtitle": "📝 CME SELF-ASSESSMENT QUESTION", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "", "bullets": ["📝 CME SELF-ASSESSMENT QUESTION", "Which cannabinoid medicine has the strongest evidence base (Phase III RCT-proven, FDA-approved) for an anti-epileptic indication?", "Dronabinol (THC) for generalised epilepsy", "Nabilone for complex partial seizures", "Cannabidiol (Epidiolex) for Dravet syndrome and LGS"], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - CME SELF-ASSESSMENT QUESTION\n\nEvidence tag: SELF-ASSESSMENT\n\nTeaching point: Interactive check: answer first, then discuss the explanation.\n\nDetail from source deck after scientific cleanup:\n📝 CME SELF-ASSESSMENT QUESTION\nWhich cannabinoid medicine has the strongest evidence base (Phase III RCT-proven, FDA-approved) for an anti-epileptic indication?\nDronabinol (THC) for generalised epilepsy\nNabilone for complex partial seizures\nCannabidiol (Epidiolex) for Dravet syndrome and LGS\nSativex (THC:CBD) for MS-associated epilepsy\n✔ Epidiolex (pharmaceutical-grade CBD) received FDA approval in 2018 for Dravet syndrome and Lennox-Gastaut syndrome based on three pivotal RCTs. Dronabinol/nabilone are approved for CINV. Sativex is approved for MS spasticity, not epilepsy.\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 74, "moduleKey": "M4", "module": "M4 / Disease & Evidence", "title": "Proceeding to ": 76, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Module 5 — Learning Objectives", "subtitle": "Learning target: mechanism first, safety always, claims evidence-graded.", "evidence": "SAFETY - counselling", "teaching": "Learning target: mechanism first, safety always, claims evidence-graded.", "bullets": ["Explain CB1/CB2 as GPCR targets and describe agonism, partial agonism, allosteric modulation, and enzyme inhibition as pharmacological mechanisms", "List the major CNS and systemic adverse effects of cannabinoid use and explain each mechanistically via ECS receptors", "Identify the major CYP450 drug interactions of CBD and THC and explain clinical consequences for co-prescribed medications", "Apply safety cautions for special populations: pregnancy, lactation, adolescents, elderly, and patients with psychiatric vulnerability", "Describe cannabis use disorder and the pharmacological basis of tolerance, dependence, and withdrawal"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - Module 5 — Learning Objectives\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: Learning target: mechanism first, safety always, claims evidence-graded.\n\nDetail from source deck after scientific cleanup:\nExplain CB1/CB2 as GPCR targets and describe agonism, partial agonism, allosteric modulation, and enzyme inhibition as pharmacological mechanisms\nList the major CNS and systemic adverse effects of cannabinoid use and explain each mechanistically via ECS receptors\nIdentify the major CYP450 drug interactions of CBD and THC and explain clinical consequences for co-prescribed medications\nApply safety cautions for special populations: pregnancy, lactation, adolescents, elderly, and patients with psychiatric vulnerability\nDescribe cannabis use disorder and the pharmacological basis of tolerance, dependence, and withdrawal\nApply a structured physician counselling framework for patients asking about cannabinoid products\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 77, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "GPCR Receptor Pharmacology — The Foundation", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["CB1 and CB2 are GPCRs — receptor pharmacology teaching applies directly", "GPCR signal transduction review:", "Agonist → GPCR activation → Gα dissociation → effector regulation; Gi-coupled (CB1/CB2) → inhibit adenylyl cyclase → ↓cAMP → downstream ↓PKA activity", "CB1/CB2: also signal via Gβγ → ↓VGCC (↓Ca2+ influx → ↓neurotransmitter release) and ↑GIRK (K+ efflux → hyperpolarisation)", "Cannabinoid receptor pharmacology types:"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - GPCR Receptor Pharmacology — The Foundation\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nCB1 and CB2 are GPCRs — receptor pharmacology teaching applies directly\nGPCR signal transduction review:\nAgonist → GPCR activation → Gα dissociation → effector regulation; Gi-coupled (CB1/CB2) → inhibit adenylyl cyclase → ↓cAMP → downstream ↓PKA activity\nCB1/CB2: also signal via Gβγ → ↓VGCC (↓Ca2+ influx → ↓neurotransmitter release) and ↑GIRK (K+ efflux → hyperpolarisation)\nCannabinoid receptor pharmacology types:\nFull agonist: 2-AG. THC is best taught as a partial CB1/CB2 agonist with dose- and context-dependent effects.\nPartial agonist (AEA, THC at lower receptor density): submaximal activation — ceiling effect — lower maximal response than full agonist\nNegative allosteric modulator / NAM (CBD at CB1): binds allosteric site → ↓agonist efficacy + ↓agonist potency — explains CBD's 'entourage' modulation of THC\nInverse agonist (Rimonabant at CB1): binds orthosteric site → below-baseline receptor activity → used experimentally and pharmacologically\nEnzyme inhibition (CBD → FAAH inhibition): indirect ECS potentiation without receptor binding — distinct mechanism\nTeaching tool: cannabinoids illustrate every major receptor pharmacology concept in one ligand family — excellent pharmacology integration\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 78, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Adverse Effects of Cannabinoids — By System", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": [], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - Adverse Effects of Cannabinoids — By System\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\n\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 79, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Psychosis Risk — The Most Critical Safety Teaching", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["Cannabinoid-associated psychosis is the single most important adverse effect to teach at MBBS level", "Evidence base:", "Large epidemiological studies (Di Forti et al., Lancet 2019): Daily high-potency (>10% THC) cannabis use associated with 5x higher risk of first-episode psychosis vs non-users", "High-potency cannabis ('skunk', >15% THC) in inner-London study: attributable fraction of psychosis = 30% — not trivial", "Dose-response relationship: frequency of use + potency of THC product both independently predict psychosis risk"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - Psychosis Risk — The Most Critical Safety Teaching\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nCannabinoid-associated psychosis is the single most important adverse effect to teach at MBBS level\nEvidence base:\nLarge epidemiological studies (Di Forti et al., Lancet 2019): Daily high-potency (>10% THC) cannabis use associated with 5x higher risk of first-episode psychosis vs non-users\nHigh-potency cannabis ('skunk', >15% THC) in inner-London study: attributable fraction of psychosis = 30% — not trivial\nDose-response relationship: frequency of use + potency of THC product both independently predict psychosis risk\nMechanism — CB1 and dopamine dysregulation:\nCB1 receptors on dopaminergic neurons in VTA (ventral tegmental area) → THC → ↑dopamine release in striatum → ↑DA signalling → positive psychotic symptoms\nPrefrontal cortex CB1 → ↓GABA interneuron function → ↓cortical inhibition → disorganised thought and paranoia\nHippocampal CB1 → impaired pattern separation → reality monitoring failure\nRisk factors — who is most vulnerable?\nGenetic risk: COMT Val158Met polymorphism (high COMT activity → low prefrontal DA), AKT1 polymorphism — significantly amplified psychosis risk with cannabis use\nAdolescent brain: CB1 density peaks during teen years; exposure during synaptic pruning disrupts development most severely\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 80, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "CYP450 Drug Interactions — Critical for Safe Prescribing", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 1 - approved use", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["CYP450 interactions of CBD and THC are clinically significant — must be taught for patient safety", "CBD as CYP inhibitor:", "CYP2C19 INHIBITION (moderate): CBD inhibits CYP2C19 → ↑plasma levels of CYP2C19 substrates", "Clinical examples: Clobazam (anti-epileptic used with Epidiolex) → ↑N-desmethylclobazam (active metabolite) → ↑sedation, ataxia — dose adjustment needed", "Other CYP2C19 substrates: Omeprazole, phenytoin, warfarin, diazepam — potential increased exposure with CBD"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - CYP450 Drug Interactions — Critical for Safe Prescribing\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nCYP450 interactions of CBD and THC are clinically significant — must be taught for patient safety\nCBD as CYP inhibitor:\nCYP2C19 INHIBITION (moderate): CBD inhibits CYP2C19 → ↑plasma levels of CYP2C19 substrates\nClinical examples: Clobazam (anti-epileptic used with Epidiolex) → ↑N-desmethylclobazam (active metabolite) → ↑sedation, ataxia — dose adjustment needed\nOther CYP2C19 substrates: Omeprazole, phenytoin, warfarin, diazepam — potential increased exposure with CBD\nCYP3A4 INHIBITION (mild-moderate): CBD → ↑levels of CYP3A4 substrates including many statins, immunosuppressants, benzodiazepines\nTHC as CYP substrate and inhibitor:\nTHC metabolised by CYP2C9 and CYP3A4 to 11-OH-THC (psychoactive) and THC-COOH (inactive)\nTHC can inhibit CYP1A1 — relevant for polycyclic aromatic hydrocarbon-related drug interactions\nHigh-risk interaction combinations:\nCBD + clobazam: sedation amplification — clinical management required (dose reduction, therapeutic monitoring)\nCBD + warfarin: INR elevation reported — case reports and in vitro data; INR monitoring essential if co-prescribed\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 81, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Special Populations — Safety Framework", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["High-Risk Populations (CONTRAINDICATED or strong caution)", "Caution-Required Populations", "PREGNANCY: THC crosses placental barrier; fetal CB1 essential for normal neurodevelopment; cannabis use in pregnancy associated with IUGR, preterm birth, neonatal NAS, and long-term cognitive impairment in offspring — AVOID ALL cannabinoids (except physician-supervised medicinal CBD in extreme circumstances)", "LACTATION: THC concentrates in breast milk (up to 8x plasma); neonatal exposure via breastfeeding — CONTRAINDICATED", "ADOLESCENTS: Developing brain with high CB1 density during synaptic pruning; irreversible cognitive impairment risk; psychosis vulnerability — AVOID all recreational and unmonitored cannabinoid use"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - Special Populations — Safety Framework\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nHigh-Risk Populations (CONTRAINDICATED or strong caution)\nCaution-Required Populations\nPREGNANCY: THC crosses placental barrier; fetal CB1 essential for normal neurodevelopment; cannabis use in pregnancy associated with IUGR, preterm birth, neonatal NAS, and long-term cognitive impairment in offspring — AVOID ALL cannabinoids (except physician-supervised medicinal CBD in extreme circumstances)\nLACTATION: THC concentrates in breast milk (up to 8x plasma); neonatal exposure via breastfeeding — CONTRAINDICATED\nADOLESCENTS: Developing brain with high CB1 density during synaptic pruning; irreversible cognitive impairment risk; psychosis vulnerability — AVOID all recreational and unmonitored cannabinoid use\nSCHIZOPHRENIA/PSYCHOSIS HISTORY: Absolute contraindication to THC-containing products; even CBD requires caution\nELDERLY: ↓hepatic CYP metabolism → higher CBD/THC plasma exposure; ↑fall risk (postural hypotension, sedation); ↑cognitive vulnerability; CYP interaction risk higher due to polypharmacy\nCARDIOVASCULAR DISEASE: Tachycardia and blood pressure variability in MI, arrhythmia, and heart failure; cannabis-associated MI risk in young adults\nLIVER DISEASE: FAAH/MAGL expressed in liver; CBD hepatotoxicity at higher doses; impaired drug metabolism\nRESPIRATORY DISEASE: Smoked cannabis contraindicated in COPD, asthma (combustion irritants)\nRENAL DISEASE: Reduced drug clearance; monitor for CBD accumulation\nIMMUNOCOMPROMISED: CB2-mediated T-cell suppression may worsen immune status — theoretical but clinically relevant in HIV, post-transplant\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 82, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Cannabis Use Disorder — Pharmacological Basis", "subtitle": "Teach ECS as endogenous human physiology - not as a cannabis topic.", "evidence": "GRADE 2 - emerging clinical", "teaching": "Teach ECS as endogenous human physiology - not as a cannabis topic.", "bullets": ["DEFINITION: Cannabis Use Disorder (CUD)", "A recognised DSM-5 substance use disorder characterised by problematic cannabis use leading to significant impairment, with withdrawal syndrome and tolerance. Prevalence: 9% of lifetime cannabis users develop dependence; 17% if use started in adolescence.", "TOLERANCE: CB1 receptor downregulation and internalisation with chronic exposure → reduced response to same dose; requires higher doses for same effect", "DEPENDENCE: Chronic CB1 downregulation → physical dependence; withdrawal on cessation", "WITHDRAWAL SYNDROME: Irritability, anxiety, sleep disturbance, decreased appetite, restlessness, dysphoria. Onset 24-48h after cessation; peaks 2-3 days; resolves in 1-2 weeks. Not life-threatening but clinically significant"], "boundary": "Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "notes": "Speaker notes - Cannabis Use Disorder — Pharmacological Basis\n\nEvidence tag: GRADE 2 - emerging clinical\n\nTeaching point: Teach ECS as endogenous human physiology - not as a cannabis topic.\n\nDetail from source deck after scientific cleanup:\nDEFINITION: Cannabis Use Disorder (CUD)\nA recognised DSM-5 substance use disorder characterised by problematic cannabis use leading to significant impairment, with withdrawal syndrome and tolerance. Prevalence: 9% of lifetime cannabis users develop dependence; 17% if use started in adolescence.\nTOLERANCE: CB1 receptor downregulation and internalisation with chronic exposure → reduced response to same dose; requires higher doses for same effect\nDEPENDENCE: Chronic CB1 downregulation → physical dependence; withdrawal on cessation\nWITHDRAWAL SYNDROME: Irritability, anxiety, sleep disturbance, decreased appetite, restlessness, dysphoria. Onset 24-48h after cessation; peaks 2-3 days; resolves in 1-2 weeks. Not life-threatening but clinically significant\nHIGH-RISK POPULATIONS: Early-onset use (adolescent), daily or near-daily use, high-potency products, co-morbid psychiatric conditions\nTREATMENT: CBT is first-line; pharmacological options (gabapentin, N-acetylcysteine in adolescents) under study; no approved pharmacotherapy\nTEACHING NOTE: This is not a reason to dismiss ECS education — alcohol causes dependence and is taught in pharmacology. CUD is a legitimate safety fact requiring honest acknowledgement\n\nBoundary: Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "pmids": []}, {"num": 83, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Physician Counselling Framework — SAFE-ECS", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 2 - emerging clinical", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["A structured framework for physicians when patients ask about cannabinoid products", "S — Seek the clinical question (what specifically is the patient asking about?)", "Understand the product (CBD oil? Hemp? Prescription cannabis? Recreational?), the intended use (pain, sleep, anxiety, cancer?), and the source (licensed pharmacy, online, unregulated)", "A — Assess the clinical context", "Current medications (CYP interactions?), psychiatric history (psychosis risk?), pregnancy or lactation status, age (adolescent?), liver function (hepatotoxicity risk?)"], "boundary": "Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "notes": "Speaker notes - Physician Counselling Framework — SAFE-ECS\n\nEvidence tag: GRADE 2 - emerging clinical\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nA structured framework for physicians when patients ask about cannabinoid products\nS — Seek the clinical question (what specifically is the patient asking about?)\nUnderstand the product (CBD oil? Hemp? Prescription cannabis? Recreational?), the intended use (pain, sleep, anxiety, cancer?), and the source (licensed pharmacy, online, unregulated)\nA — Assess the clinical context\nCurrent medications (CYP interactions?), psychiatric history (psychosis risk?), pregnancy or lactation status, age (adolescent?), liver function (hepatotoxicity risk?)\nF — Frame the evidence correctly\nMatch evidence level to the patient's condition: approved indication? Grade 2 emerging? Grade 3 preclinical only? Never misrepresent evidence tier\nE — Explain safety profile\nAdverse effects relevant to the patient's situation: sedation? Cognitive? Cardiovascular? Drug interaction risk? Addiction potential for long-term use?\nE — Evaluate legality and product quality\nIs the product legally obtained? AYUSH-licensed/licensed product vs. unregulated? Batch consistency, CBD:THC ratio, third-party testing?\nC — Collaborate and refer\n\nBoundary: Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "pmids": []}, {"num": 84, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Cannabinoid Safety — Quick Reference Card", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": [], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - Cannabinoid Safety — Quick Reference Card\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\n\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 85, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "MODULE SUMMARY", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "SAFETY - counselling", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["Module 5 — Pharmacology & Safety", "CB1/CB2 are Gi-coupled GPCRs. THC = partial CB1/CB2 agonist with dose-dependent CNS effects. AEA = partial agonist. CBD: non-intoxicating, multimodal signalling; GPR55/TRPV1/5-HT1A and other targets are studied. Enzyme inhibition is key CBD mechanism.", "Major adverse effects: sedation (CB1 CNS), psychosis (mesolimbic CB1+DA), cognitive impairment (hippocampal/cortical CB1), tachycardia (sympathetic rebound), postural hypotension.", "Psychosis risk: Daily high-potency THC = 5x psychosis risk. Adolescent and genetic vulnerability amplifies risk. CBD (NAM) partially protects against THC psychotogenicity.", "CYP450 interactions: CBD inhibits CYP2C19 (clobazam, warfarin, phenytoin) and CYP3A4. Medication reconciliation must include cannabinoid product history."], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - MODULE SUMMARY\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nModule 5 — Pharmacology & Safety\nCB1/CB2 are Gi-coupled GPCRs. THC = partial CB1/CB2 agonist with dose-dependent CNS effects. AEA = partial agonist. CBD: non-intoxicating, multimodal signalling; GPR55/TRPV1/5-HT1A and other targets are studied. Enzyme inhibition is key CBD mechanism.\nMajor adverse effects: sedation (CB1 CNS), psychosis (mesolimbic CB1+DA), cognitive impairment (hippocampal/cortical CB1), tachycardia (sympathetic rebound), postural hypotension.\nPsychosis risk: Daily high-potency THC = 5x psychosis risk. Adolescent and genetic vulnerability amplifies risk. CBD (NAM) partially protects against THC psychotogenicity.\nCYP450 interactions: CBD inhibits CYP2C19 (clobazam, warfarin, phenytoin) and CYP3A4. Medication reconciliation must include cannabinoid product history.\nSpecial populations: Pregnancy, lactation, adolescents, schizophrenia — CONTRAINDICATED for THC. Elderly — high caution. Always assess CYP interactions.\nSAFE-ECS counselling framework: Seek, Assess, Frame evidence, Explain safety, Evaluate legality, Collaborate/refer. MBBS counsels — does not prescribe independently.\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 86, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "CME Self-Assessment", "subtitle": "📝 CME SELF-ASSESSMENT QUESTION", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "", "bullets": ["📝 CME SELF-ASSESSMENT QUESTION", "A 45-year-old patient with drug-resistant epilepsy on clobazam is prescribed Epidiolex (CBD). What is the primary pharmacokinetic concern?", "CBD induces CYP3A4, reducing clobazam levels below therapeutic range", "CBD inhibits CYP2C19, increasing levels of active clobazam metabolite N-desmethylclobazam, causing excess sedation", "CBD blocks FAAH, which metabolises clobazam via a non-CYP pathway"], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - CME SELF-ASSESSMENT QUESTION\n\nEvidence tag: SELF-ASSESSMENT\n\nTeaching point: Interactive check: answer first, then discuss the explanation.\n\nDetail from source deck after scientific cleanup:\n📝 CME SELF-ASSESSMENT QUESTION\nA 45-year-old patient with drug-resistant epilepsy on clobazam is prescribed Epidiolex (CBD). What is the primary pharmacokinetic concern?\nCBD induces CYP3A4, reducing clobazam levels below therapeutic range\nCBD inhibits CYP2C19, increasing levels of active clobazam metabolite N-desmethylclobazam, causing excess sedation\nCBD blocks FAAH, which metabolises clobazam via a non-CYP pathway\nCBD competes with clobazam for CB1 receptor binding, reducing anti-epileptic efficacy\n✔ CBD inhibits CYP2C19, the primary enzyme metabolising clobazam to its active metabolite N-desmethylclobazam. This leads to increased N-desmethylclobazam levels → ↑sedation, ataxia, dizziness. Clobazam dose reduction and monitoring are required. This is specified in Epidiolex prescribing information.\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 87, "moduleKey": "M5", "module": "M5 / Pharmacology & Safety", "title": "Proceeding to Module 6 — The Final Module:", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "CURRICULUM - governance", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["MODULE 5 COMPLETE", "Curriculum, Clinical Translation", "& Future Directions for India", "Module 6 covers the NMC curriculum blueprint, subject-wise integration, implementation roadmap, and India's ECS research future."], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - Proceeding to Module 6 — The Final Module:\n\nEvidence tag: CURRICULUM - governance\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nMODULE 5 COMPLETE\nCurriculum, Clinical Translation\n& Future Directions for India\nModule 6 covers the NMC curriculum blueprint, subject-wise integration, implementation roadmap, and India's ECS research future.\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 88, "moduleKey": "M6", "module": "M6", "title": "Curriculum & Future", "subtitle": "Curriculum, Clinical Translation", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "", "bullets": ["Curriculum, Clinical Translation", "NMC Blueprint · CBME Integration · Subject-Wise Plan · Governance · India's Opportunity", "Physiology-first. Evidence-graded. Non-promotional."], "boundary": "", "notes": "Speaker notes - Curriculum & Future\n\nEvidence tag: CURRICULUM - governance\n\nTeaching point: Mechanism does not equal indication: match every claim to its evidence level.\n\nDetail from source deck after scientific cleanup:\nCurriculum, Clinical Translation y\nEvery clinical claim must carry its evidence grade (Grade 1/2/3). No clinical claim without an evidence classification. Faculty use the approved language control framework.\n📏 Scope Boundary Statements\nEach module must contain an explicit boundary statement: 'This module teaches ECS physiology and safety literacy. Clinical cannabinoid prescribing belongs to postgraduate/specialist training.' Repeated at start and end of each teaching session.\n🔍 Annual Review Committee\nExpert committee conducts annual evidence review. Updates incorporated into teaching materials. New approvals (Grade 1) added; withdrawn claims removed. ECS science moves fast — governance must keep pace.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 96, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "NMC Implementation Roadmap", "subtitle": "Fit ECS into existing subjects; no new burden, no undergraduate prescribing.", "evidence": "CURRICULUM - governance", "teaching": "Fit ECS into existing subjects; no new burden, no undergraduate prescribing.", "bullets": [], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - NMC Implementation Roadmap\n\nEvidence tag: CURRICULUM - governance\n\nTeaching point: Fit ECS into existing subjects; no new burden, no undergraduate prescribing.\n\nDetail from source deck after scientific cleanup:\n\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 97, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "Faculty Development CME — Outline", "subtitle": "One central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release.", "evidence": "SAFETY - counselling", "teaching": "One central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release.", "bullets": ["A 2.5-3 hour faculty sensitisation CME is required before any ECS co armacology, pathology, forensic, and community medicine. Historical milestones. Conservative educational scope definition.\n🌐 Part 3: Global Benchmarking\nNine-country comparison (USA, Canada, UK, Australia, Israel, Germany, France, Japan, China + India). Shows India can lead with a structured model while others remain fragmented.\n📋 Part 4: MBBS Curriculum Blueprint\nPhase I–II distribution. Subject-by-subject competencies, hours, pedagogy, and assessment. ECS competency codes (ECS-PY-01 through ECS-CM-01). 15-18 hour total lean module.\n🏛️ Part 5: Governance and Roadmap\n7-stage implementation plan. Faculty development CME outline. Risk register and 8-item mitigation plan. Safeguards against promotional misuse. PG pathway boundary note.\n📚 Part 6: Annexures\nOne-page policy summary. MCQ bank (5 sample). SAQ bank (5 sample). Evidence-grading language framework. Faculty handbook chapter outline. Expert committee suggested composition.\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 103, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "Addressing Anticipated NMC Concerns", "subtitle": "Mechanism does not equal indication: match every claim to its evidence level.", "evidence": "GRADE 1 - approved use", "teaching": "Mechanism does not equal indication: match every claim to its evidence level.", "bullets": ["Anticipated questions from NMC expert committee — pre-emptive answers", "CONCERN: 'The curriculum is already overloaded — we cannot add new content.' ANSWER: 15-18 hours total is not a new subject. It replaces or augments existing physiology/biochemistry lectures on lipid mediators, GPCR signalling, and homeostasis. Zero new subjects or departments required.", "CONCERN: 'Students may misuse this to self-prescribe or advocate cannabis.' ANSWER: The module explicitly and repeatedly states that prescribing belongs to PG/specialist training. MCQs, SAQs, and viva questions are all structured around scientific literacy — not clinical prescribing. Repeated boundary statements are mandatory.", "CONCERN: 'Evidence base is not strong enough for medical education.' ANSWER: ECS physiology is documented in peer-reviewed journals including Nature Reviews Neurology, NEJM, Lancet, and Biological Psychiatry. CB1 was discovered in 1990; CB2 in 1993; Epidiolex approved 2018. This is established science — not emerging research.", "CONCERN: 'There are legal/NDPS complications.' ANSWER: The forensic module explicitly teaches NDPS distinctions. Endogenous ECS physiology has no NDPS implications — teaching it no more promotes controlled substance use than teaching endorphin physiology promotes opioid use."], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - Addressing Anticipated NMC Concerns\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Mechanism does not equal indication: match every claim to its evidence level.\n\nDetail from source deck after scientific cleanup:\nAnticipated questions from NMC expert committee — pre-emptive answers\nCONCERN: 'The curriculum is already overloaded — we cannot add new content.' ANSWER: 15-18 hours total is not a new subject. It replaces or augments existing physiology/biochemistry lectures on lipid mediators, GPCR signalling, and homeostasis. Zero new subjects or departments required.\nCONCERN: 'Students may misuse this to self-prescribe or advocate cannabis.' ANSWER: The module explicitly and repeatedly states that prescribing belongs to PG/specialist training. MCQs, SAQs, and viva questions are all structured around scientific literacy — not clinical prescribing. Repeated boundary statements are mandatory.\nCONCERN: 'Evidence base is not strong enough for medical education.' ANSWER: ECS physiology is documented in peer-reviewed journals including Nature Reviews Neurology, NEJM, Lancet, and Biological Psychiatry. CB1 was discovered in 1990; CB2 in 1993; Epidiolex approved 2018. This is established science — not emerging research.\nCONCERN: 'There are legal/NDPS complications.' ANSWER: The forensic module explicitly teaches NDPS distinctions. Endogenous ECS physiology has no NDPS implications — teaching it no more promotes controlled substance use than teaching endorphin physiology promotes opioid use.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 104, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "ECS Education and Integrative Medicine", "subtitle": "Mechanism does not equal indication: match every claim to its evidence level.", "evidence": "GRADE 2 - emerging clinical", "teaching": "Mechanism does not equal indication: match every claim to its evidence level.", "bullets": ["ECS provides the scientific bridge between modern biomedicine and India's Ayurvedic heritage", "The mechanistic bridge: Phytotherapy explained via ECS", "Vijaya (Cannabis sativa) in Ayurvedic text: Used for pain, anxiety, sleep — these are CB1-mediated ECS functions. ECS science provides the receptor-level explanation that traditional texts could not.", "β-Caryophyllene (a sesquiterpene in black pepper, cloves, and multiple Ayurvedic plants): A selective CB2 agonist — established by Gertsch et al. (2008). This is an Ayurvedic plant compound activating the immune ECS without psychoactivity.", "Palmitoylethanolamide (PEA): An endogenous fatty acid amide (analogous to AEA), anti-inflammatory, available as a food supplement in Europe. Related structurally to AEA. Ayurvedic diet may modulate these lipid mediator levels."], "boundary": "Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "notes": "Speaker notes - ECS Education and Integrative Medicine\n\nEvidence tag: GRADE 2 - emerging clinical\n\nTeaching point: Mechanism does not equal indication: match every claim to its evidence level.\n\nDetail from source deck after scientific cleanup:\nECS provides the scientific bridge between modern biomedicine and India's Ayurvedic heritage\nThe mechanistic bridge: Phytotherapy explained via ECS\nVijaya (Cannabis sativa) in Ayurvedic text: Used for pain, anxiety, sleep — these are CB1-mediated ECS functions. ECS science provides the receptor-level explanation that traditional texts could not.\nβ-Caryophyllene (a sesquiterpene in black pepper, cloves, and multiple Ayurvedic plants): A selective CB2 agonist — established by Gertsch et al. (2008). This is an Ayurvedic plant compound activating the immune ECS without psychoactivity.\nPalmitoylethanolamide (PEA): An endogenous fatty acid amide (analogous to AEA), anti-inflammatory, available as a food supplement in Europe. Related structurally to AEA. Ayurvedic diet may modulate these lipid mediator levels.\nAshwagandha (Withania somnifera): Withanolides may modulate ECS gene expression — preliminary evidence connecting an Ayurvedic adaptogen to ECS stress pathways\nAYUSH-CBME interface:\nAs CBME increasingly incorporates integrative medicine perspectives, ECS provides a scientifically rigorous mechanistic framework for what traditional practitioners have observed empirically\nIndia's strategic position: The nation that can write the ECS–Ayurveda mechanistic interface as a global academic contribution — connecting ancient clinical wisdom to 21st-century receptor biology\n\nBoundary: Use cautious language: emerging, heterogeneous, adjunctive, specialist-guided.", "pmids": []}, {"num": 105, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "Integrating ECS in Clinical Years — Reinforcement Only", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "GRADE 1 - approved use", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["Clinical year ECS teaching strategy — reinforce, do not reload", "Medicine / Internal Medicine:", "Reinforce ECS in metabolic syndrome teaching odes ECS-PY-01 to ECS-CM-01 cover Knowledge, Skill, and Attitude across six subjects. CBME-compliant horizontal integration — no new subject or department.", "NMC proposal: 6-part document (letter, synopsis, global benchmarking, curriculum blueprint, governance, annexures). Targets expert committee formation as first step.", "Language discipline: Grade 1/2/3 evidence framework. Hard prohibitions on cure claims, anti-cancer treatment claims, and undergraduate prescribing protocols. Annual review mandatory."], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - MODULE SUMMARY\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nModule 6 — Curriculum & Future\nMBBS curriculum: 15-18 hours total. Phase I: Anatomy (2h), Physiology (5-6h), Biochemistry (2h). Phase II: Pharmacology (4h), Pathology (2h), Forensic (1h), Community (1h).\nCompetency codes ECS-PY-01 to ECS-CM-01 cover Knowledge, Skill, and Attitude across six subjects. CBME-compliant horizontal integration — no new subject or department.\nNMC proposal: 6-part document (letter, synopsis, global benchmarking, curriculum blueprint, governance, annexures). Targets expert committee formation as first step.\nLanguage discipline: Grade 1/2/3 evidence framework. Hard prohibitions on cure claims, anti-cancer treatment claims, and undergraduate prescribing protocols. Annual review mandatory.\nIndia's opportunity: First nation to develop a structured physiology-first MBBS ECS module — leads in both scientific accuracy and governance quality vs. fragmented Western approaches.\nFuture pathway: MBBS literacy → Faculty CME → PG Diploma/Fellowship → Research. ECS research priorities: pharmacogenomics, India disease burden, Ayurveda interface, pharmacovigilance.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 107, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "CME Self-Assessment", "subtitle": "📝 CME SELF-ASSESSMENT QUESTION", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "", "bullets": ["📝 CME SELF-ASSESSMENT QUESTION", "According to the NMC curriculum blueprint, in which MBBS phase should the core ECS physiology teaching (retrograde signalling, homeostatic role, pain, sleep) be completed?", "Clinical phase III (4th year)", "Phase II Second Professional (Pharmacology term)", "Phase I First Professional (by end of Physiology)"], "boundary": "Keep the undergraduate scope to literacy and safety, not prescribing.", "notes": "Speaker notes - CME SELF-ASSESSMENT QUESTION\n\nEvidence tag: SELF-ASSESSMENT\n\nTeaching point: Interactive check: answer first, then discuss the explanation.\n\nDetail from source deck after scientific cleanup:\n📝 CME SELF-ASSESSMENT QUESTION\nAccording to the NMC curriculum blueprint, in which MBBS phase should the core ECS physiology teaching (retrograde signalling, homeostatic role, pain, sleep) be completed?\nClinical phase III (4th year)\nPhase II Second Professional (Pharmacology term)\nPhase I First Professional (by end of Physiology)\nPhase II alongside Forensic Medicine\n✔ The NMC blueprint positions core ECS physiology (retrograde signalling, homeostasis, pain, sleep, stress) in Phase I First Professional — within Physiology (5-6h) and Biochemistry (2h) — completed before students enter Phase II. Pharmacology in Phase II builds on this foundation with receptor pharmacology and safety.\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 108, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "Case Study: Implementing ECS at a Medical College — Simulation", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and : Evaluation and feedback\nPost-module survey; MCQ performance analysis; faculty feedback; expert committee review; send pilot findings to NMC with recommendations for national rollout\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 109, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "ECS and the Future of Pharmacology Teaching", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["ECS integration strengthens pharmacology teaching across multiple domains", "ECS as a GPCR pharmacology model:", "CB1/CB2 illustrate every major GPCR concept — Gi-coupling, agonism, partial agonism, NAM (CBD), enzyme inhibition (FAAH), tolerance (receptor internalisation), and inverse agonism", "No other receptor family in the pharmacology curriculum provides this range of pharmacological concepts in a single system", "Drug interaction teaching:"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - ECS and the Future of Pharmacology Teaching\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nECS integration strengthens pharmacology teaching across multiple domains\nECS as a GPCR pharmacology model:\nCB1/CB2 illustrate every major GPCR concept — Gi-coupling, agonism, partial agonism, NAM (CBD), enzyme inhibition (FAAH), tolerance (receptor internalisation), and inverse agonism\nNo other receptor family in the pharmacology curriculum provides this range of pharmacological concepts in a single system\nDrug interaction teaching:\nCYP450 interactions (CBD-clobazam, CBD-warfarin) provide real-world case examples of enzyme inhibition drug interactions — more clinically relevant than many textbook examples\nReceptor downregulation and tolerance:\nCB1 downregulation with chronic THC exposure provides a clear mechanistic model of GPCR tolerance — directly applicable to opioid, beta-agonist, and beta-blocker pharmacology understanding\nAdverse effect prediction from receptor distribution:\nCB1 in hippocampus → memory impairment; CB1 in basal ganglia → motor effects; CB2 in immune cells → immunomodulation without psychoactivity — demonstrates how receptor distribution mapping predicts clinical pharmacology\nTeaching innovation: ECS examples can replace or supplement several existing GPCR case examples with more clinically current and patient-relevant material\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 110, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "ECS Across the Patient Lifecycle — Teaching Continuum", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["ECS changes across the human lifespan — an integrated physiology teaching arc", "Fetal and neonatal period:", "ECS is essential for CNS development — CB1 guides neuronal migration, axonal growth, and synaptogenesis", "2-AG in breast milk: proposed role in neonatal suckling reflex and enteric nervous system maturation", "Safety implication: Any exogenous cannabinoid exposure during this period disrupts developmental ECS signalling"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - ECS Across the Patient Lifecycle — Teaching Continuum\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\nECS changes across the human lifespan — an integrated physiology teaching arc\nFetal and neonatal period:\nECS is essential for CNS development — CB1 guides neuronal migration, axonal growth, and synaptogenesis\n2-AG in breast milk: proposed role in neonatal suckling reflex and enteric nervous system maturation\nSafety implication: Any exogenous cannabinoid exposure during this period disrupts developmental ECS signalling\nAdolescence (highest vulnerability):\nCB1 receptor density peaks during teenage years — part of synaptic pruning process; highest vulnerability to exogenous cannabinoid disruption\nECS-mediated fear extinction and emotional regulation develop during adolescence; cannabis exposure impairs this development\nAdulthood (optimal ECS function):\nECS tone maintains homeostatic balance across pain, stress, immune, and metabolic functions; exercise upregulates AEA ('runner's high')\nAging (declining ECS tone):\nCB1 receptor density decreases with aging; FAAH activity may increase in some tissues; ECS-mediated neuroprotection potentially reduced\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 111, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "ECS Education: What Success Looks Like", "subtitle": "One central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release.", "evidence": "GRADE 1 - approved use", "teaching": "One central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release.", "bullets": ["At MBBS Graduation — The ECS-Literate Graduate", "At PG Entry — Ready for the Next Level", "Can define ECS as an endogenous lipid signalling system with CB1/CB2 receptors, AEA/2-AG ligands, and FAAH/MAGL enzymes", "Can explain retrograde signalling as ECS's defining physiological mechanism", "Knows that ECS regulates pain, mood, sleep, appetite, immunity, and gut-brain signalling"], "boundary": "Approved use is narrow, product-specific and jurisdiction-specific.", "notes": "Speaker notes - ECS Education: What Success Looks Like\n\nEvidence tag: GRADE 1 - approved use\n\nTeaching point: One central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release.\n\nDetail from source deck after scientific cleanup:\nAt MBBS Graduation — The ECS-Literate Graduate\nAt PG Entry — Ready for the Next Level\nCan define ECS as an endogenous lipid signalling system with CB1/CB2 receptors, AEA/2-AG ligands, and FAAH/MAGL enzymes\nCan explain retrograde signalling as ECS's defining physiological mechanism\nKnows that ECS regulates pain, mood, sleep, appetite, immunity, and gut-brain signalling\nCan explain why CBD is not psychoactive (CB1 NAM, not agonist)\nCan counsel patients on basic safety: adverse effects, CYP interactions, special population cautions\nCan explain NDPS legal framework and distinguish endogenous physiology from cannabis intoxication\nUnderstands that prescribing cannabinoid medicines belongs to PG/specialist supervised training\nHas the physiology and pharmacology foundation to learn clinical cannabinoid therapeutics responsibly\nCan appraise clinical trial evidence using Grade 1/2/3 framework\nCan engage with prescribing guidelines (Health Canada, TGA, NICE) intelligently\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 112, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "The ECS Argument in Three Minutes — Elevator Pitch", "subtitle": "The practical MBBS outcome is safer counselling and risk recognition.", "evidence": "SAFETY - counselling", "teaching": "The practical MBBS outcome is safer counselling and risk recognition.", "bullets": ["🧬 The Scientific Gap", "The ECS was discovered in 1988-1995. It is a conserved, fundamental homeostatic signalling system. It is not in the MBBS curriculum. That is a scientific error that must be corrected.", "🏥 The Patient Safety Case", "Patients ask about CBD, hemp, and medical cannabis every day. Physicians without ECS training cannot counsel safely. That is a patient safety failure. ECS education prevents harm.", "🌍 The Global Opportunity"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - The ECS Argument in Three Minutes — Elevator Pitch\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: The practical MBBS outcome is safer counselling and risk recognition.\n\nDetail from source deck after scientific cleanup:\n🧬 The Scientific Gap\nThe ECS was discovered in 1988-1995. It is a conserved, fundamental homeostatic signalling system. It is not in the MBBS curriculum. That is a scientific error that must be corrected.\n🏥 The Patient Safety Case\nPatients ask about CBD, hemp, and medical cannabis every day. Physicians without ECS training cannot counsel safely. That is a patient safety failure. ECS education prevents harm.\n🌍 The Global Opportunity\nNo country has a physiology-first, CBME-aligned, nationally standardised UG ECS curriculum. India can be first — with proper governance, no promotional content, and MBBS-appropriate scope.\n📚 The Academic Argument\n15-18 hours. No new subject. No new department. No undergraduate prescribing. Pure scientific literacy built into existing lectures. CBME makes this easy.\n⚖️ The Safety Argument\nPrecisely because cannabinoids are powerful, patients need physicians who understand ECS. Ignorance does not protect — it endangers. Knowledge, with appropriate boundaries, protects.\n🇮🇳 The India Argument\nIndia has CBME, Ayurvedic heritage, pharmacology strength, and NMC governance. We are uniquely positioned to create the world's best ECS undergraduate curriculum. The time is now.\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}, {"num": 113, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "Frequently Asked Questions — Physician Edition", — NO prescribing. As a practitioner post-training: only for approved indications (epilepsy, CINV, MS spasticity), under specialist guidance, using regulated products, with CYP interaction assessment and informed consent.\nQ: My patient uses cannabis for pain — is that safe? A: Teach the evidence: Grade 2 emerging for neuropathic pain; significant adverse effect profile; drug interactions; psychosis risk in vulnerable patients; product quality varies enormously. Refer to pain specialist for assessment.\nQ: Is CBD legal in India? A: CBD from hemp seeds/leaves with Indian legality is product-, source-, licence- and state-specific; verify current NDPS/AYUSH/state rules. This is distinct from NDPS-scheduled cannabis. Legal advice and current regulatory guidance should be sought — this is a fast-changing regulatory landscape.\nQ: A patient with cancer is asking about cannabis. How do I respond? A: Acknowledge CINV and pain adjunct evidence (Grade 1-2). Explicitly state that no cannabinoid has proven anti-tumour efficacy in human RCTs. Address anxiety about cancer — often the real driver. Refer to palliative care / oncology team.\nQ: Is CBD safe during pregnancy? A: No. CONTRAINDICATED. Insufficient human safety data; animal data shows developmental toxicity; THC (often co-present) definitely crosses placenta. Maternal risk communication is your obligation as a physician.\n\nBoundary: Approved use is narrow, product-specific and jurisdiction-specific.", "pmids": []}, {"num": 114, "moduleKey": "M6", "module": "M6 / Curriculum & Future", "title": "ECS Research Landmarks — A Timeline for Teaching", "subtitle": "Close with the few points a physician must remember tomorrow.", "evidence": "GRADE 1 - approved use", "teaching": "Close with the few points a physician must remember tomorrow.", "bullets": ["Research milestones that define ECS as an established scientific field — suitable for faculty reference", "1940: Roger Adams isolates CBD; structure incompletely characterised", "
