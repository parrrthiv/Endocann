p of this content — which is why a horizontal CBME approach is ideal.\n\nBoundary: Keep the undergraduate scope to literacy and safety, not prescribing.", "pmids": []}, {"num": 120, "moduleKey": "Complete", "module": "CME MASTERCLASS COMPLETE", "title": "Endocannabinoid System", "subtitle": "Introduction", "evidence": "FOUNDATIONAL SCIENCE", "teaching": "", "bullets": ["Introduction", "Components", "Physiology", "Disease", "Safety"], "boundary": "Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "notes": "Speaker notes - CME Masterclass Complete\n\nEvidence tag: SAFETY - counselling\n\nTeaching point: Close with the few points a physician must remember tomorrow.\n\nDetail from source deck after scientific cleanup:\nIntroduction\nComponents\nPhysiology\nDisease\nSafety\nCurriculum\nNo part of this content promotes recreational cannabis use, commercial products, or unsupervised prescribing of cannabinoid therapeutics.\n\nBoundary: Screen medications, pregnancy/lactation, age, psychiatric and cardiovascular risk.", "pmids": []}]}</script>
<script>
(function(){
  const data = JSON.parse(document.getElementById('payload').textContent);
  const slides = data.slides;
  let current = 0;
  const $ = id => document.getElementById(id);

  const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const clean = s => String(s??'').replace(/[✅❌🧬💊🗣️📋🔬🌏📝✔🔵🔴🟡🟢⚪🌡️🔗🔒🚫📊⚡🎯⚠️]/g,'').replace(/\s+/g,' ').trim();
  const shorten = (s,n=115) => { s=clean(s); return s.length>n?s.slice(0,n-1)+'…':s; };
  const bullets = s => (s.bullets||[]).map(clean).filter(Boolean);

  /* Module metadata — logical learning order */
  const moduleMeta = {
    M1:{name:'Introduction',      c1:'#0b6c60',c2:'#0d3572',c3:'#a86e10'},
    M2:{name:'Components',        c1:'#1b52a7',c2:'#0e2d6e',c3:'#a86e10'},
    M3:{name:'Physiology',        c1:'#237340',c2:'#1a5230',c3:'#a86e10'},
    M4:{name:'Disease & Evidence',c1:'#5947a3',c2:'#3a2e7c',c3:'#a86e10'},
    M5:{name:'Pharmacology & Safety',c1:'#9c2740',c2:'#6d1427',c3:'#a86e10'},
    M6:{name:'Curriculum',        c1:'#1c5f8e',c2:'#0e3460',c3:'#a86e10'},
    Complete:{name:'CME Complete', c1:'#476070',c2:'#2e3d4e',c3:'#a86e10'},
    Overview:{name:'Overview',     c1:'#0b6c60',c2:'#0d3572',c3:'#a86e10'},
  };
  /* Logical self-learning order */
  const moduleOrder = ['M1','M2','M3','M4','M5','M6','Complete'];

  function moduleName(k){ return (moduleMeta[k]||{name:k}).name; }

  function evClass(e){
    e = String(e||'').toLowerCase();
    if(e.includes('safety')) return 'safety';
    if(e.includes('grade 1')) return 'g1';
    if(e.includes('grade 2')) return 'g2';
    if(e.includes('grade 3')) return 'g3';
    if(e.includes('curriculum')) return 'cur';
    return '';
  }

  function evidenceNote(e){
    e = String(e||'').toLowerCase();
    if(e.includes('grade 1')) return 'Grade 1 — Approved clinical use. Teach with exact indication, jurisdiction, product context, and monitoring requirements.';
    if(e.includes('grade 2')) return 'Grade 2 — Emerging clinical evidence. Useful for literature literacy and cautious adjunctive counselling. Not yet standard of care.';
    if(e.includes('grade 3')) return 'Grade 3 — Preclinical/mechanism only. Teach the biology; do not present as a clinical indication. Use language: "in animal/cell models…"';
    if(e.includes('safety')) return 'Safety & counselling content. Focus on: screening, adverse effects, CYP interactions, psychosis risk, special populations, and referral thresholds.';
    if(e.includes('curriculum')) return 'Curriculum governance content. Framing for CBME integration, NMC proposal, and faculty teaching — not for clinical prescribing guidance.';
    if(e.includes('self-assessment')) return 'Self-assessment. Answer independently first, then read the rationale. Use this to check understanding, not to memorise isolated facts.';
    return 'Foundational science. Apply physiology to build clinical literacy — before discussing cannabinoid medicines, products, or policy.';
  }

  function moduleTheme(s){ return moduleMeta[s.moduleKey] || moduleMeta.Overview; }

  function sectionData(s){
    const b = bullets(s);
    const notes = clean(s.extended_notes || s.notes || '');
    const title = clean(s.title);
    const subtitle = clean(s.subtitle);
    /* Teaching: use s.teaching unless it's generic or empty */
    const rawTeaching = clean(s.teaching||'');
    const genericTeachings = [
      'one central mechanism: postsynaptic feedback reduces presynaptic neurotransmitter release',
      'close with the few points a physician must remember tomorrow'
    ];
    const isGeneric = genericTeachings.some(g => rawTeaching.toLowerCase().includes(g.toLowerCase()));
    const teaching = (!rawTeaching || isGeneric)
      ? (subtitle || b[0] || title)
      : rawTeaching;
    /* Definition: prefer s.definition, then key_points[0], then bullets[0] */
    const def = s.definition ? clean(s.definition.text) :
                s.key_points && s.key_points[0] ? clean(s.key_points[0].head + ': ' + s.key_points[0].body) :
                b[0] || subtitle;
    /* Mechanism: prefer s.mechanism.title + steps[0], then key_points[1] */
    const mech = s.mechanism ? clean(s.mechanism.title || (s.mechanism.steps && s.mechanism.steps[0]) || '') :
                 s.key_points && s.key_points[1] ? clean(s.key_points[1].head + ': ' + s.key_points[1].body) :
                 b[1] || teaching;
    /* Clinical: key_points[2] or bullets[2] */
    const clin = s.key_points && s.key_points[2] ? clean(s.key_points[2].head + ': ' + s.key_points[2].body) :
                 b[2] || 'Apply this knowledge for safer counselling, risk recognition, and evidence-graded communication with patients.';
    /* Safety: boundary or key_points[3] */
    const safe = clean(s.boundary) || (s.key_points && s.key_points[3] ? clean(s.key_points[3].head + ': ' + s.key_points[3].body) : 'Mechanism is not an indication. Keep all clinical claims evidence-graded and within appropriate safety scope.');
    return { title, subtitle, teaching, def, mech, clin, safe, extras:b.slice(3,7), notes };
  }

  /* ── SVG VISUALS ── */
  function svgText(text, x, y, w, fs, color, weight='600', align='middle'){
    text = esc(shorten(text, Math.max(18, Math.floor(w/5.5))));
    const ta = align==='middle'?'center':'left';
    return `<foreignObject x="${x}" y="${y}" width="${w}" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Source Sans 3,Arial,sans-serif;font-size:${fs}px;line-height:1.3;color:${color};font-weight:${weight};text-align:${ta};padding:0 2px">${text}</div>
    </foreignObject>`;
  }
  function box(x,y,w,h,fill,stroke,r=16){
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
  }
  function arrow(x1,y1,x2,y2,col){
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>`;
  }
  function defs(col){
    return `<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="${col}"/>
    </marker></defs>`;
  }

  function visualKind(s){
    const h=[s.title,s.subtitle,s.teaching,s.boundary].concat(bullets(s)).join(' ').toLowerCase();
    if(/psychosis|titration|dose|adverse|contraindication|cyp|interaction|safety|red flag/.test(h)) return 'safetyFlow';
    if(/cbd|thc|versus| vs |comparison|compare|side.by.side/.test(h)) return 'comparison';
    if(/cb1|cb2|receptor|distribution/.test(h)) return 'receptorMap';
    if(/curriculum|mbbs|teaching|assessment|internship|competency|cbme/.test(h)) return 'curriculum';
    if(/faah|magl|anandamide|2-ag|synthesis|degradation|enzyme|pathway/.test(h)) return 'pathway';
    if(/self.assess|question|faq/.test((s.title||'').toLowerCase())) return 'checkpoint';
    if(/evidence|approved use|emerging clinical|mechanism only|grade/.test(h)) return 'evidenceLadder';
    if(/pain|inflammation|immune|neuro|gut|cancer|metabolic|disease|condition/.test(h)) return 'clinicalMatrix';
    return 'logicFlow';
  }

  function visualCaption(kind){
    return ({
      safetyFlow:   'Safety-first flowchart: titration protocol, monitoring checkpoints, step-back logic, and urgent referral thresholds.',
      comparison:   'Side-by-side comparison to support counselling, clinical differentiation, and accurate patient communication.',
      receptorMap:  'Receptor distribution schematic for visualising ECS anatomy and predicting pharmacological effects by location.',
      curriculum:   'Teaching architecture showing how this concept integrates into the MBBS/CBME curriculum across phases.',
      pathway:      'Mechanistic pathway map: components, sequence, upstream triggers, and downstream effects.',
      checkpoint:   'Revision checkpoint — answer the question independently before reading the explanation.',
      evidenceLadder:'Evidence ladder: mechanism data at base, RCT-proven approved use at top. Grade every clinical claim.',
      clinicalMatrix:'Clinical matrix linking ECS pathophysiology, symptom domain, mechanism, and safety language.',
      logicFlow:    'Concept map linking definition → mechanism → clinical application → safety boundary for this slide.'
    })[kind] || 'Concept map for this clinical teaching point.';
  }
  function visualTitle(kind){
    return ({
      safetyFlow:'Safety & titration', comparison:'Comparison visual', receptorMap:'Receptor map',
      curriculum:'Curriculum map', pathway:'Pathway diagram', checkpoint:'Self-assessment',
      evidenceLadder:'Evidence ladder', clinicalMatrix:'Clinical matrix', logicFlow:'Concept map'
    })[kind] || 'Visual overview';
  }

  function makeSVG(kind, s, th){
    const c1=th.c1, c2=th.c2, c3=th.c3;
    const w=340, h=260;
    const hdr = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="background:#f8f6ff;border-radius:12px">` + defs(c1);
    const close = `</svg>`;

    const kw = extractKeywords(s);

    if(kind==='safetyFlow'){
      const steps = [
        {l:'Screen risk factors',c:'#fef3f6',bc:'#f0b8c8'},
        {l:'Start lowest dose',c:'#fff8e6',bc:'#e8c870'},
        {l:'Review at 1–2 weeks',c:'#e8f5ee',bc:'#7cbc94'},
        {l:'Benefit OK, tolerable?',c:'#e6f0fb',bc:'#7aaae4'},
        {l:'Adverse effects? → Step back',c:'#fef3f6',bc:'#f0b8c8'},
        {l:'Severe / psychosis? → STOP',c:c1,bc:c1}
      ];
      let svg = hdr;
      const bw=170, bh=32, bx=85, gap=38;
      steps.forEach((st,i)=>{
        const by=14+i*gap;
        const fill=i===5?c1:st.c; const tc=i===5?'#fff':'#1c2a36';
        svg+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="10" fill="${fill}" stroke="${st.bc}" stroke-width="1.5"/>`;
        svg+=svgText(st.l, bx+6, by+4, bw-12, 11.5, tc, '700');
        if(i<5) svg+=arrow(bx+bw/2,by+bh,bx+bw/2,by+gap-2,c1);
      });
      svg+=close; return svg;
    }

    if(kind==='comparison'){
      const left = kw[0]||'CB1', right = kw[1]||'CB2';
      let svg = hdr;
      svg+=box(10,10,155,240,'#f0f4ff','#b0c4f5');
      svg+=box(175,10,155,240,'#f0fff6','#8ed9aa');
      svg+=svgText(left,10,14,155,13,c2,'800');
      svg+=svgText(right,175,14,155,13,c1,'800');
      const rows=['Distribution','Ligands','Signalling','Adverse effects','Drug target'];
      rows.forEach((r,i)=>{
        const y=42+i*38;
        svg+=`<rect x="14" y="${y}" width="147" height="30" rx="8" fill="#e8eeff" stroke="#c4d3f8"/>`;
        svg+=`<rect x="179" y="${y}" width="147" height="30" rx="8" fill="#e0f7e8" stroke="#a8dfb4"/>`;
        svg+=svgText(r, 18, y+4, 139, 11, c2, '600', 'left');
        svg+=svgText(r, 183, y+4, 139, 11, c1, '600', 'left');
      });
      svg+=close; return svg;
    }

    if(kind==='receptorMap'){
      let svg = hdr;
      svg+=`<ellipse cx="170" cy="60" rx="70" ry="42" fill="${c2}" opacity=".12" stroke="${c2}" stroke-width="1.5"/>`;
      svg+=svgText('CNS / Brain',105,40,130,13,c2,'800');
      svg+=svgText('CB1 dense: BG · Hippocampus · Cortex · Cerebellum',108,60,124,10,'#1a3a6c','600');
      const periph=[['Peripheral nociceptors (CB1/CB2)',10,130,150,'#237340'],
                    ['Immune cells / Microglia (CB2)',180,130,150,'#5947a3'],
                    ['Gut ENS (CB1/CB2)',10,190,150,'#a86e10'],
                    ['Adipose / Liver (CB1)',180,190,150,'#9c2740']];
      periph.forEach(([label,x,y,w,col])=>{
        svg+=box(x,y,w,44,col+'18',col+'66');
        svg+=svgText(label,x+6,y+8,w-12,11,col,'700','left');
      });
      svg+=arrow(170,102,90,128,c2);
      svg+=arrow(170,102,245,128,c1);
      svg+=close; return svg;
    }

    if(kind==='pathway'){
      const steps2=(s.mechanism&&s.mechanism.steps)||
        ['On-demand synthesis from membrane lipid (Ca²⁺ trigger)',
         'AEA (via NAPE-PLD) or 2-AG (via DAGL-α) released',
         'Retrograde binding to CB1/CB2 → Gi signalling',
         'FAAH or MAGL terminates signal within seconds'];
      let svg=hdr;
      const bw=300, bh=44, bx=20, gap=56;
      steps2.slice(0,4).forEach((st,i)=>{
        const by=10+i*gap;
        const col=[c2,c1,'#237340','#9c2740'][i];
        svg+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="14" fill="${col}1a" stroke="${col}55" stroke-width="1.5"/>`;
        svg+=`<circle cx="${bx+20}" cy="${by+22}" r="12" fill="${col}"/>`;
        svg+=`<text x="${bx+20}" y="${by+27}" text-anchor="middle" font-size="12" fill="#fff" font-weight="900">${i+1}</text>`;
        svg+=svgText(clean(st), bx+38, by+8, bw-46, 11.5, col, '700', 'left');
        if(i<3) svg+=arrow(bx+bw/2, by+bh, bx+bw/2, by+gap-2, col);
      });
      svg+=close; return svg;
    }

    if(kind==='checkpoint'){
      let svg=hdr;
      svg+=box(20,16,300,60,'#e8eeff','#a0b8f0');
      svg+=svgText('Self-Assessment Question',30,22,280,14,c2,'800');
      svg+=svgText('Answer independently — then read the full rationale.',30,44,280,11,'#334466','600');
      const opts=['A','B','C','D'];
      opts.forEach((opt,i)=>{
        const y=96+i*40;
        const col=i===0?c1:'#6e7d8c';
        svg+=box(20,y,300,32,i===0?c1+'18':'#f5f5fc',i===0?c1+'55':'#c4cad4');
        svg+=`<circle cx="40" cy="${y+16}" r="11" fill="${i===0?c1:'#dde2e8'}"/>`;
        svg+=`<text x="40" y="${y+21}" text-anchor="middle" font-size="12" fill="${i===0?'#fff':'#6e7d8c'}" font-weight="800">${opt}</text>`;
        svg+=svgText(kw[i]||`Option ${opt}`, 58, y+6, 256, 11.5, col, i===0?'700':'500', 'left');
      });
      svg+=close; return svg;
    }

    if(kind==='evidenceLadder'){
      const levels=[
        {l:'Grade 1 — Approved',sub:'RCT-proven, regulated',fill:c1,tc:'#fff'},
        {l:'Grade 2 — Emerging',sub:'Clinical trials, reviews',fill:'#237340',tc:'#fff'},
        {l:'Grade 3 — Preclinical',sub:'Cell/animal models only',fill:'#a86e10',tc:'#fff'},
        {l:'Mechanistic hypothesis',sub:'Teach biology, not indication',fill:'#5947a3',tc:'#fff'},
      ];
      let svg=hdr;
      levels.forEach((lv,i)=>{
        const bw2=180+i*30, bx2=(w-bw2)/2, by2=20+i*56;
        svg+=`<rect x="${bx2}" y="${by2}" width="${bw2}" height="42" rx="12" fill="${lv.fill}" opacity="${1-i*.12}"/>`;
        svg+=svgText(lv.l, bx2+8, by2+4, bw2-16, 12, lv.tc, '800');
        svg+=svgText(lv.sub, bx2+8, by2+22, bw2-16, 10.5, lv.tc, '500');
      });
      svg+=close; return svg;
    }

    if(kind==='clinicalMatrix'){
      const rows2=[
        ['System',kw[0]||'Pain',kw[1]||'Stress',kw[2]||'Immunity'],
        ['ECS component','CB1 · TRPV1','AEA · CB1','CB2 · 2-AG'],
        ['Key mechanism','Nociceptor gating','HPA termination','M2 polarisation'],
        ['Safety note','Dose-dependent','Partial agonism','No psychoactivity'],
      ];
      let svg=hdr;
      const cols=[10,100,195,275], rows3=[10,74,130,186,230];
      const cw=[88,90,78,60];
      const hdCols=[c2,c1,'#237340','#5947a3'];
      rows2.forEach((row,ri)=>{
        row.forEach((cell,ci)=>{
          const x=cols[ci], y=rows3[ri], w2=cw[ci], h2=ri===0?58:50;
          const fill=ri===0?(ci===0?'#f0f0f8':hdCols[ci-1]):(ci===0?'#f5f0fe':'#fff');
          const tc=ri===0&&ci>0?'#fff':(ci===0?'#3a2e70':'#2a3a44');
          svg+=`<rect x="${x}" y="${y}" width="${w2}" height="${h2}" rx="8" fill="${fill}" stroke="#d8d0f0" stroke-width="1"/>`;
          svg+=svgText(cell, x+3, y+4, w2-6, 10, tc, ri===0&&ci>0?'800':ci===0?'700':'600');
        });
      });
      svg+=close; return svg;
    }

    /* Default: logicFlow */
    const nodes=[
      {l:'Definition',body:kw[0]||'Core concept',fill:c2+'22',stroke:c2,tc:c2,x:20,y:16,w:140,h:48},
      {l:'Mechanism',body:kw[1]||'How it works',fill:c1+'22',stroke:c1,tc:c1,x:180,y:16,w:140,h:48},
      {l:'Clinical use',body:kw[2]||'Application',fill:'#23734022',stroke:'#237340',tc:'#237340',x:20,y:136,w:140,h:48},
      {l:'Safety',body:kw[3]||'Boundary',fill:'#9c274022',stroke:'#9c2740',tc:'#9c2740',x:180,y:136,w:140,h:48},
    ];
    let svg=hdr;
    nodes.forEach(n=>{
      svg+=`<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="14" fill="${n.fill}" stroke="${n.stroke}" stroke-width="1.5"/>`;
      svg+=svgText(n.l, n.x+6, n.y+4, n.w-12, 10.5, n.tc, '800');
      svg+=svgText(n.body, n.x+6, n.y+22, n.w-12, 11, '#1c2c38', '600');
    });
    /* Centre connector */
    svg+=`<circle cx="170" cy="100" r="18" fill="${c1}" opacity=".15" stroke="${c1}" stroke-width="1"/>`;
    svg+=svgText('ECS',161,92,18,10,c1,'900');
    [arrow(140,40,152,88,c2),arrow(180,40,188,82,c1),arrow(152,112,110,136,c1),arrow(188,112,220,136,c1)].forEach(a=>svg+=a);
    svg+=close; return svg;
  }

  function extractKeywords(s){
    const hay=[s.title,s.subtitle,s.teaching].concat(bullets(s)).join(' ').toLowerCase();
    const candidates=['homeostasis','pain','inflammation','immune','cb1','cb2','aea','2-ag','faah','magl','cns','safety','counselling','pharmacology','evidence','curriculum','psychosis','cyp450','cannabis','dose','titration','adjunct','physiology','gut','cancer','sleep','stress','anxiety','nausea','epilepsy'];
    const out=[];
    candidates.forEach(k=>{if(hay.includes(k)&&out.length<4)out.push(k.toUpperCase());});
    if(!out.length){clean(s.title).split(/\s+/).filter(w=>w.length>3).slice(0,4).forEach(w=>out.push(w.toUpperCase()));}
    return out.slice(0,4);
  }

  function makeVisual(s){
    const kind=visualKind(s);
    const th=moduleTheme(s);
    const svg=makeSVG(kind,s,th);
    return `<section class="visual-panel">
      <div class="visual-head"><b>${esc(visualTitle(kind))}</b><span>${esc(kind)}</span></div>
      <div class="visual-wrap">${svg}</div>
      <div class="visual-caption">${esc(visualCaption(kind))}</div>
    </section>`;
  }

  function richBlocks(s){
    let html='';
    if(s.key_points && s.key_points.length){
      html+=`<div class="kgrid">${s.key_points.slice(0,4).map(k=>`<div class="kcard"><h3>${esc(clean(k.head))}</h3><p>${esc(clean(k.body))}</p></div>`).join('')}</div>`;
    }
    if(s.mechanism && s.mechanism.steps && s.mechanism.steps.length){
      html+=`<div class="step-list">${s.mechanism.steps.slice(0,4).map((st,i)=>`<div class="step-row"><div class="step-num">${i+1}</div><div class="step-body">${esc(clean(st))}</div></div>`).join('')}</div>`;
    }
    return html;
  }

  function refs(s){
    let pmids=[...new Set([...(s.pmids||[]),...((s.references||[]).map(r=>r.pmid).filter(Boolean))])];
    const q=encodeURIComponent((s.title||'')+' endocannabinoid system');
    let html=`<a class="ref-pill primary" target="_blank" rel="noopener" href="https://pubmed.ncbi.nlm.nih.gov/?term=${q}">PubMed <span class="ext">↗</span></a>`;
    html+=`<a class="ref-pill" target="_blank" rel="noopener" href="https://scholar.google.com/scholar?q=${q}">Scholar <span class="ext">↗</span></a>`;
    pmids.slice(0,4).forEach(p=>{
      html+=`<a class="ref-pill" target="_blank" rel="noopener" href="https://pubmed.ncbi.nlm.nih.gov/${encodeURIComponent(p)}/">PMID ${esc(p)} <span class="ext">↗</span></a>`;
    });
    return html;
  }

  function renderModules(){
    const first={};
    slides.forEach((s,i)=>{ if(first[s.moduleKey]===undefined) first[s.moduleKey]=i; });
    $('modules').innerHTML=moduleOrder.filter(k=>first[k]!==undefined)
      .map(k=>`<button class="mod" data-i="${first[k]}">${esc(moduleName(k))}</button>`).join('');
    [...document.querySelectorAll('.mod')].forEach(b=>b.onclick=()=>go(+b.dataset.i));
  }

  function renderGoto(){
    $('goto').innerHTML=slides.map((s,i)=>`<option value="${i}">${String(s.num).padStart(3,'0')} · ${esc(moduleName(s.moduleKey))} · ${esc(clean(s.title))}</option>`).join('');
  }

  function applyTheme(s){
    const th=moduleTheme(s);
    const r=document.documentElement.style;
    r.setProperty('--th1',th.c1);
    r.setProperty('--th2',th.c2);
    r.setProperty('--th3',th.c3);
    r.setProperty('--th1-soft',th.c1+'18');
    r.setProperty('--th2-soft',th.c2+'12');
  }

  function render(){
    const s=slides[current];
    const x=sectionData(s);
    const pct=Math.round(((current+1)/slides.length)*100);
    applyTheme(s);
    $('slideMeta').textContent=String(s.num).padStart(2,'0')+' / 120';
    $('pct').textContent=pct+'%';
    $('bar').style.width=pct+'%';
    $('goto').value=String(current);
    $('prev').disabled=current===0;
    $('next').textContent=current===slides.length-1?'Finish ✓':'Next →';

    document.querySelectorAll('.mod').forEach(btn=>{
      const idx=+btn.dataset.i;
      btn.classList.toggle('active', slides[idx].moduleKey===s.moduleKey);
    });

    const extras=x.extras.length
      ?`<details><summary>Clinical explanation & application <span class="arr">＋</span></summary><div class="det-body"><ul>${x.extras.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div></details>`:'';
    const notes=x.notes
      ?`<details><summary>Extended teaching notes <span class="arr">＋</span></summary><div class="det-body">${x.notes.split(/\n+/).filter(Boolean).map(p=>`<p>${esc(clean(p))}</p>`).join('')}</div></details>`:'';
    const specialDose=current===0
      ?`<div class="dose-note"><div class="lab">Product-specific dosing note</div><div class="txt">Madanakameshwari Lehya and CR64 use indication-wise physician dosing with <b>½ teaspoon + 1 glass warm milk</b> (Anupana). They do <b>not</b> use weight-based cannabinoid titration protocols.</div></div>`:'';

    $('slide').innerHTML=`
      <div class="slide-accent"></div>
      <div class="bg-orb"></div>
      <div class="slide-inner">
        <div class="meta">
          <span class="chip no">Slide ${s.num} / 120</span>
          <span class="chip module">${esc(moduleName(s.moduleKey))}</span>
          <span class="chip ev ${evClass(s.evidence)}">${esc(clean(s.evidence||'Clinical content'))}</span>
        </div>
        <h2 class="title">${esc(x.title)}</h2>
        ${x.subtitle?`<p class="subtitle">${esc(x.subtitle)}</p>`:''}
        <div class="teaching-box"><div class="lab">Clinical learning point</div><div class="txt">${esc(x.teaching)}</div></div>
        <div class="layout">
          <div>${makeVisual(s)}</div>
          <div class="content-area">
            ${specialDose}
            <div class="quad-grid">
              <div class="qcard def"><span class="qcard-label">Definition</span><div class="qcard-body">${esc(x.def)}</div></div>
              <div class="qcard mech"><span class="qcard-label">Mechanism</span><div class="qcard-body">${esc(x.mech)}</div></div>
              <div class="qcard clin"><span class="qcard-label">Clinical application</span><div class="qcard-body">${esc(x.clin)}</div></div>
              <div class="qcard safe"><span class="qcard-label">Safety / scope boundary</span><div class="qcard-body">${esc(x.safe)}</div></div>
            </div>
            <div class="ev-note"><div class="lab">Evidence interpretation</div><div class="txt">${esc(evidenceNote(s.evidence))}</div></div>
            ${richBlocks(s)}
            ${extras}
            ${notes}
            <div class="refs-wrap"><div class="refs-label">Evidence links</div><div class="ref-pills">${refs(s)}</div></div>
          </div>
        </div>
      </div>`;
  }

  function go(i){
    current=Math.max(0,Math.min(slides.length-1,i));
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  $('prev').onclick=()=>go(current-1);
  $('next').onclick=()=>go(current+1);
  $('goto').onchange=e=>go(+e.target.value);
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight') go(current+1);
    if(e.key==='ArrowLeft')  go(current-1);
  });
  let startX=null;
  document.addEventListener('touchstart',e=>{startX=e.changedTouches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(startX==null) return;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>70){ if(dx<0) go(current+1); else go(current-1); }
    startX=null;
  },{passive:true});

  renderModules();
  renderGoto();
  render();
})();
</script>
</body>
</html>
